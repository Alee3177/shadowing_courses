nt-size:14px;color:var(--muted);margin-top:10px}.list{max-height:540px;overflow:auto;padding:10px}.row{padding:12px;border-radius:16px;border:1px solid transparent;cursor:pointer;margin-bottom:8px;background:#fff}.row:hover{border-color:#bfdbfe}.row.active{background:#eff6ff;border-color:#60a5fa;box-shadow:0 0 0 3px rgba(37,99,235,.12)}.row .rjp{font-weight:900;font-size:18px}.row .rmeta{font-size:13px;color:var(--muted)}.small{font-size:13px;color:var(--muted)}.sectionTitle{font-size:24px;margin:24px 0 12px}.drillGrid{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px}.picker{padding:16px}.patternBtn{width:100%;text-align:left;margin-bottom:8px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;cursor:pointer}.patternBtn.active{border-color:var(--pri);background:#eff6ff}.patternName{font-weight:900}.patternDesc{font-size:13px;color:var(--muted)}.drillCard{padding:18px}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:14px 0}.field label{display:block;font-size:13px;color:#475569;font-weight:800;margin-bottom:4px}.field select{width:100%}.qa{display:grid;grid-template-columns:1fr;gap:12px}.bubble{border:1px solid var(--line);border-radius:20px;padding:14px;background:#fff}.bubble.q{background:#f8fafc}.bubble .label{font-size:13px;font-weight:900;color:var(--accent);margin-bottom:4px}.table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px;overflow:hidden;border-radius:18px;border:1px solid var(--line)}.table th,.table td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}.table th{background:#f8fafc;text-align:left}.table tr:last-child td{border-bottom:0}.note{background:#fffbeb;border:1px solid #fde68a;border-radius:18px;padding:12px;margin-top:12px;color:#78350f}@media(max-width:900px){.grid,.drillGrid{grid-template-columns:1fr}.hero{position:relative;top:0}.list{max-height:50vh}.formGrid{grid-template-columns:1fr}.jp{font-size:30px}.main{min-height:auto}}

<body>
<div class="wrap">

          <select id="delay"><option value="800">и·ҹи®Җе»¶йҒІ 0.8з§’</option><option value="1200" selected>и·ҹи®Җе»¶йҒІ 1.2з§’</option><option value="1600">и·ҹи®Җе»¶йҒІ 1.6з§’</option></select>
        </div>
        <div class="status" id="status">жЁЎејҸпјҡе…ҲиҒҪж—Ҙж–Ү вҶ’ еҒңй “ вҶ’ иҮӘе·ұи·ҹи®ҖгҖӮ</div>

    </div>
  </section>

  <section id="drillPanel" class="panel">
    <h2 class="sectionTitle">з¶ңеҗҲйЎҢпјҡе•Ҹзӯ”еҸҘеһӢпјӢеҸҜжӣҝжҸӣжҷӮж…ӢжҮүз”Ё</h2>
    <div class="drillGrid">
      <div class="card picker" id="patternPicker"></div>

            <button class="btn green" onclick="speakText(document.getElementById('aJp').textContent)">ж’ӯж”ҫеӣһзӯ”</button>

<script>
const sceneFiles = [
  {name:'з¬¬дёҖе ҙйқўпјҡж—…иЎҢгҒ®иЁҲз”»', file:'scene1_plan.json'},
  {name:'з¬¬дәҢе ҙйқўпјҡеё°еӣҪеҫҢгҒ®ж„ҹжғі', file:'scene2_impressions.json'},
  {name:'з¬¬дёүе ҙйқўпјҡж¬ЎгҒ®иЁҲз”»', file:'scene3_next_plan.json'},
  {name:'з¶ңеҗҲе•Ҹзӯ”еҸҘеһӢ', drill:true}
];
let scenes=[], currentScene=0, current=0, playing=false, paused=false, stopFlag=false;
let playToken=0, activeAudioResolve=null;
const audioPlayer = new Audio();
audioPlayer.preload = 'auto';
audioPlayer.setAttribute('playsinline','');
audioPlayer.setAttribute('webkit-playsinline','');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function $(id){return document.getElementById(id)}
function initTabs(){
  $('tabs').innerHTML = sceneFiles.map((x,i)=>`<button class="tab ${i===0?'active':''}" onclick="switchTab(${i})">${x.name}</button>`).join('');
}
async function loadScenes(){
  try{
    for(const s of sceneFiles.filter(x=>!x.drill)){
      const res = await fetch(s.file + '?v=' + Date.now());
      if(!res.ok) throw new Error(`${s.file} ијүе…ҘеӨұж•—пјҡ${res.status}`);
      scenes.push(await res.json());
    }
    renderScene();
    $('status').textContent='е·Іијүе…Ҙ JSONгҖӮиӢҘ JSON е…§жңү audio ж¬„дҪҚпјҢжңғе„Әе…Ҳж’ӯж”ҫ MP3пјӣеӨұж•—жҷӮиҮӘеӢ•ж”№з”Ё TTSгҖӮ';
  }catch(err){
  $('jp').textContent='JSON ијүе…ҘеӨұж•—';
  $('kana').textContent='';
  $('romaji').textContent=err.message || String(err);
  $('status').textContent='';
  console.error(err);
}
}
function switchTab(i){
  document.querySelectorAll('.tab').forEach((b,idx)=>b.classList.toggle('active',idx===i));
  if(sceneFiles[i].drill){$('shadowPanel').classList.remove('active');$('drillPanel').classList.add('active');renderPatternPicker();renderDrill();return;}
  $('drillPanel').classList.remove('active');$('shadowPanel').classList.add('active');currentScene=i;current=0;stopAll();renderScene();
}
function renderScene(){
  const scene=scenes[currentScene]; if(!scene) return;
  $('sceneBadge').textContent=`${scene.title}пҪң${scene.titleZh}`;
  renderCurrent();
  $('list').innerHTML=scene.items.map((x,i)=>`<div class="row ${i===current?'active':''}" id="row${i}" onclick="jumpTo(${i})"><div class="rmeta">${i+1}. ${x.speaker}</div><div class="rjp">${x.jp}</div><div class="rmeta">${x.kana}<br>${x.romaji}<br>${x.zh}</div></div>`).join('');
}
function renderCurrent(){
  const item=scenes[currentScene].items[current];
  $('jp').textContent=`${item.speaker}пјҡ${item.jp}`;$('kana').textContent=item.kana;$('romaji').textContent=item.romaji;$('zh').textContent=item.zh;
  document.querySelectorAll('.row').forEach((r,i)=>r.classList.toggle('active',i===current));
  const row=$('row'+current); if(row) row.scrollIntoView({block:'center',behavior:'smooth'});
}
function pickVoice(){
  const voices=speechSynthesis.getVoices();
  return voices.find(v=>v.lang==='ja-JP' && /Nanami|Female|Kyoko|Google/.test(v.name)) || voices.find(v=>v.lang==='ja-JP') || null;
}
function cleanSpeakText(text){
  return String(text || '').replace(/^[A-ZгҒҝгӮ“гҒӘ]+пјҡ/,'');
}
function speakText(text){
  return new Promise(resolve=>{
    const token=++playToken;
    audioPlayer.pause();
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(cleanSpeakText(text));
    u.lang='ja-JP'; u.rate=parseFloat($('speed')?.value||'1'); u.pitch=1.02; u.voice=pickVoice();
    u.onend=()=>{ if(token===playToken) resolve(); };
    u.onerror=()=>{ if(token===playToken) resolve(); };
    speechSynthesis.speak(u);
  });
}
function playMp3(src){
  return new Promise((resolve,reject)=>{
    const token=++playToken;
    activeAudioResolve=resolve;
    speechSynthesis.cancel();
    audioPlayer.pause();
    audioPlayer.currentTime=0;
    audioPlayer.playbackRate=parseFloat($('speed')?.value||'1');
    audioPlayer.onended=()=>{ if(token===playToken){ activeAudioResolve=null; resolve(); } };
    audioPlayer.onerror=()=>{ if(token===playToken){ activeAudioResolve=null; reject(new Error('MP3ж’ӯж”ҫеӨұж•—пјҡ'+src)); } };
    audioPlayer.src=src;
    audioPlayer.load();
    audioPlayer.play().catch(err=>{
      if(token===playToken){ activeAudioResolve=null; reject(err); }
    });
  });
}
async function playVoice(item){
  const text = `${item.speaker || ''}пјҡ${item.jp || item.text || ''}`;
  const src = item.audio || item.file || item.mp3 || '';
  if(src){
    try{
      $('status').textContent=`з¬¬ ${current+1} еҸҘпјҡж’ӯж”ҫ MP3 еҺҹйҹігҖӮ`;
      await playMp3(src);
      return;
    }catch(err){
      console.warn(err);
      if(stopFlag) return;
      $('status').textContent=`MP3 еӨұж•—пјҢж”№з”Ё TTSпјҡ${src}`;
      await sleep(250);
    }
  }else{
    $('status').textContent=`з¬¬ ${current+1} еҸҘпјҡжӯӨеҸҘжІ’жңү audio ж¬„дҪҚпјҢдҪҝз”Ё TTSгҖӮ`;
  }
  await speakText(text);
}
async function startShadow(){
  if(playing){ stopAll(); await sleep(100); }
  playing=true; paused=false; stopFlag=false; $('status').textContent='и·ҹи®Җдёӯпјҡе…ҲиҒҪ MP3 еҺҹйҹіпјҢеҒңй “еҫҢи«Ӣй–ӢеҸЈи·ҹи®ҖгҖӮ';
  while(current < scenes[currentScene].items.length && !stopFlag){
    renderCurrent();
    const item=scenes[currentScene].items[current];
    await playVoice(item);
    await waitPauseOrDelay(parseInt($('delay').value,10));
    if(stopFlag) break;
    $('status').textContent=`з¬¬ ${current+1} еҸҘпјҡи«Ӣи·ҹи®Җ вҶ’ ${item.jp}`;
    await waitPauseOrDelay(1800);
    current++;
  }
  playing=false;
  if(!stopFlag){ current=Math.max(0,scenes[currentScene].items.length-1); renderCurrent(); $('status').textContent='е®ҢжҲҗдёҖијӘгҖӮеҸҜеҲҮжҸӣе ҙжҷҜжҲ–еҶҚж¬Ўй–Ӣе§ӢгҖӮ'; }
}
async function waitPauseOrDelay(ms){
  const step=100; let t=0;
  while(t<ms && !stopFlag){ if(!paused){t+=step;} await sleep(step); }
}
function stopAll(){
  stopFlag=true; playing=false; paused=false; playToken++;
  speechSynthesis.cancel();
  audioPlayer.pause();
  audioPlayer.removeAttribute('src');
  try{ audioPlayer.load(); }catch(e){}
  if(activeAudioResolve){ activeAudioResolve(); activeAudioResolve=null; }
  $('pauseBtn').textContent='жҡ«еҒң';
}
function jumpTo(i){current=i; renderCurrent(); if(playing){stopAll(); setTimeout(startShadow,120)}}
$('playBtn').onclick=startShadow;
$('pauseBtn').onclick=()=>{
  paused=!paused;
  if(paused){
    audioPlayer.pause();
    speechSynthesis.pause();
    $('pauseBtn').textContent='з№јзәҢ';
    $('status').textContent='е·Іжҡ«еҒңгҖӮ';
  }else{
    if(audioPlayer.src && audioPlayer.paused) audioPlayer.play().catch(()=>{});
    speechSynthesis.resume();
    $('pauseBtn').textContent='жҡ«еҒң';
    $('status').textContent='з№јзәҢи·ҹи®ҖгҖӮ';
  }
};
$('prevBtn').onclick=()=>{current=Math.max(0,current-1);renderCurrent()};$('nextBtn').onclick=()=>{current=Math.min(scenes[currentScene].items.length-1,current+1);renderCurrent()};$('resetBtn').onclick=()=>{stopAll();current=0;renderCurrent();$('status').textContent='е·ІйҮҚзҪ®гҖӮ'};

const vocab = {
  place:[['ж—Ҙжң¬','гҒ«гҒ»гӮ“','Nihon','ж—Ҙжң¬'],['дә¬йғҪ','гҒҚгӮҮгҒҶгҒЁ','Kyouto','дә¬йғҪ'],['еӨ§йҳӘ','гҒҠгҒҠгҒ•гҒӢ','Oosaka','еӨ§йҳӘ'],['еҢ—жө·йҒ“','гҒ»гҒЈгҒӢгҒ„гҒ©гҒҶ','Hokkaidou','еҢ—жө·йҒ“']],
  time:[['5жңҲ20ж—Ҙ','гҒ”гҒҢгҒӨгҒҜгҒӨгҒӢ','gogatsu hatsuka','5жңҲ20ж—Ҙ'],['жқҘйҖұ','гӮүгҒ„гҒ—гӮ…гҒҶ','raishuu','дёӢйҖұ'],['еӨҸ','гҒӘгҒӨ','natsu','еӨҸеӨ©'],['еҶ¬','гҒөгӮҶ','fuyu','еҶ¬еӨ©']],
  action:[['ж—…иЎҢгҒ«иЎҢгҒҸ','гӮҠгӮҮгҒ“гҒҶгҒ«гҒ„гҒҸ','ryokou ni iku','еҺ»ж—…иЎҢ'],['иІ·гҒ„зү©гӮ’гҒҷгӮӢ','гҒӢгҒ„гӮӮгҒ®гӮ’гҒҷгӮӢ','kaimono o suru','иіјзү©'],['жё©жіүгҒ«е…ҘгӮӢ','гҒҠгӮ“гҒӣгӮ“гҒ«гҒҜгҒ„гӮӢ','onsen ni hairu','жіЎжә«жіү'],['еҶҷзңҹгӮ’ж’®гӮӢ','гҒ—гӮғгҒ—гӮ“гӮ’гҒЁгӮӢ','shashin o toru','жӢҚз…§'],['гӮ№гӮӯгғјгӮ’гҒҷгӮӢ','гӮ№гӮӯгғјгӮ’гҒҷгӮӢ','sukii o suru','ж»‘йӣӘ']],
  food:[['гҒҠеҜҝеҸё','гҒҠгҒҷгҒ—','osushi','еЈҪеҸё'],['гӮ«гғӢ','гӮ«гғӢ','kani','иһғиҹ№'],['гҒҠгҒ„гҒ—гҒ„гӮӮгҒ®','гҒҠгҒ„гҒ—гҒ„гӮӮгҒ®','oishii mono','еҘҪеҗғзҡ„жқұиҘҝ'],['ж–ҷзҗҶ','гӮҠгӮҮгҒҶгӮҠ','ryouri','ж–ҷзҗҶ']],
  sight:[['жЎң','гҒ•гҒҸгӮү','sakura','ж«»иҠұ'],['йӣӘ','гӮҶгҒҚ','yuki','йӣӘ'],['гҒҚгӮҢгҒ„гҒӘжҷҜиүІ','гҒҚгӮҢгҒ„гҒӘгҒ‘гҒ—гҒҚ','kirei na keshiki','жјӮдә®зҡ„йўЁжҷҜ'],['еӨ§йҳӘеҹҺ','гҒҠгҒҠгҒ•гҒӢгҒҳгӮҮгҒҶ','Oosakajou','еӨ§йҳӘеҹҺ']],
  adjPast:[['жҘҪгҒ—гҒӢгҒЈгҒҹ','гҒҹгҒ®гҒ—гҒӢгҒЈгҒҹ','tanoshikatta','еҫҲй–Ӣеҝғ'],['гҒҠгҒ„гҒ—гҒӢгҒЈгҒҹ','гҒҠгҒ„гҒ—гҒӢгҒЈгҒҹ','oishikatta','еҫҲеҘҪеҗғ'],['гҒҚгӮҢгҒ„гҒ§гҒ—гҒҹ','гҒҚгӮҢгҒ„гҒ§гҒ—гҒҹ','kirei deshita','еҫҲжјӮдә®'],['ж°—жҢҒгҒЎиүҜгҒӢгҒЈгҒҹ','гҒҚгӮӮгҒЎгӮҲгҒӢгҒЈгҒҹ','kimochi yokatta','еҫҲиҲ’жңҚ']]
};
const patterns=[

  {name:'жғіеҒҡд»Җйәјпјҹ',desc:'дҪ•гӮ’гҒ—гҒҹгҒ„гҒ§гҒҷгҒӢ',note:'еӢ•и©һгҒҫгҒҷеҪўеҺ»жҺүгҒҫгҒҷпјӢгҒҹгҒ„гҒ§гҒҷгҖӮгҒ—гҒҫгҒҷ вҶ’ гҒ—гҒҹгҒ„гҒ§гҒҷгҖӮ',slots:['action'],build:s=>{const a=s.action[0].replace('гҒҷгӮӢ','гҒ—гҒҹгҒ„').replace('иЎҢгҒҸ','иЎҢгҒҚгҒҹгҒ„').replace('е…ҘгӮӢ','е…ҘгӮҠгҒҹгҒ„').replace('ж’®гӮӢ','ж’®гӮҠгҒҹгҒ„');const k=s.action[1].replace('гҒҷгӮӢ','гҒ—гҒҹгҒ„').replace('гҒ„гҒҸ','гҒ„гҒҚгҒҹгҒ„').replace('гҒҜгҒ„гӮӢ','гҒҜгҒ„гӮҠгҒҹгҒ„').replace('гҒЁгӮӢ','гҒЁгӮҠгҒҹгҒ„');const r=s.action[2].replace('suru','shitai').replace('iku','ikitai').replace('hairu','hairitai').replace('toru','toritai');return {q:['дҪ•гӮ’гҒ—гҒҹгҒ„гҒ§гҒҷгҒӢгҖӮ','гҒӘгҒ«гӮ’гҒ—гҒҹгҒ„гҒ§гҒҷгҒӢгҖӮ','nani o shitai desu ka.','жғіеҒҡд»Җйәјпјҹ'],a:[a+'гҒ§гҒҷгҖӮ',k+'гҒ§гҒҷгҖӮ',r+' desu.',`жғі${s.action[3]}гҖӮ`],tense:[[s.action[0]+'гҒҫгҒҷгҖӮ','иҰҒеҒҡгҖӮ'],[s.action[0].replace('гҒҷгӮӢ','гҒ—гҒҫгҒ—гҒҹ').replace('иЎҢгҒҸ','иЎҢгҒҚгҒҫгҒ—гҒҹ').replace('е…ҘгӮӢ','е…ҘгӮҠгҒҫгҒ—гҒҹ').replace('ж’®гӮӢ','ж’®гӮҠгҒҫгҒ—гҒҹ')+'гҖӮ','еҒҡдәҶгҖӮ'],[a+'гҒ§гҒҷгҖӮ','жғіеҒҡгҖӮ']]}}},
  {name:'жғіеҗғд»Җйәјпјҹ',desc:'дҪ•гӮ’йЈҹгҒ№гҒҹгҒ„гҒ§гҒҷгҒӢ',note:'йЈҹгҒ№гҒҹгҒ„гҒ§гҒҷпјқжғіеҗғгҖӮйЈҹгҒ№гҒҫгҒ—гҒҹпјқеҗғдәҶгҖӮ',slots:['food'],build:s=>({q:['дҪ•гӮ’йЈҹгҒ№гҒҹгҒ„гҒ§гҒҷгҒӢгҖӮ','гҒӘгҒ«гӮ’гҒҹгҒ№гҒҹгҒ„гҒ§гҒҷгҒӢгҖӮ','nani o tabetai desu ka.','жғіеҗғд»Җйәјпјҹ'],a:[`${s.food[0]}гӮ’йЈҹгҒ№гҒҹгҒ„гҒ§гҒҷгҖӮ`,`${s.food[1]}гӮ’гҒҹгҒ№гҒҹгҒ„гҒ§гҒҷгҖӮ`,`${s.food[2]} o tabetai desu.`,`жғіеҗғ${s.food[3]}гҖӮ`],tense:[[`${s.food[0]}гӮ’йЈҹгҒ№гҒҫгҒҷгҖӮ`,'еҗғгҖӮ'],[`${s.food[0]}гӮ’йЈҹгҒ№гҒҫгҒ—гҒҹгҖӮ`,'еҗғдәҶгҖӮ'],[`${s.food[0]}гӮ’йЈҹгҒ№гҒҹгҒ„гҒ§гҒҷгҖӮ`,'жғіеҗғгҖӮ']]})},
  {name:'жғізңӢд»Җйәјпјҹ',desc:'дҪ•гӮ’иҰӢгҒҹгҒ„гҒ§гҒҷгҒӢ',note:'иҰӢгӮӢ вҶ’ иҰӢгҒҫгҒҷ вҶ’ иҰӢгҒҹгҒ„гҒ§гҒҷпјӣйҒҺеҺ»ејҸжҳҜиҰӢгҒҫгҒ—гҒҹгҖӮ',slots:['sight'],build:s=>({q:['дҪ•гӮ’иҰӢгҒҹгҒ„гҒ§гҒҷгҒӢгҖӮ','гҒӘгҒ«гӮ’гҒҝгҒҹгҒ„гҒ§гҒҷгҒӢгҖӮ','nani o mitai desu ka.','жғізңӢд»Җйәјпјҹ'],a:[`${s.sight[0]}гӮ’иҰӢгҒҹгҒ„гҒ§гҒҷгҖӮ`,`${s.sight[1]}гӮ’гҒҝгҒҹгҒ„гҒ§гҒҷгҖӮ`,`${s.sight[2]} o mitai desu.`,`жғізңӢ${s.sight[3]}гҖӮ`],tense:[[`${s.sight[0]}гӮ’иҰӢгҒҫгҒҷгҖӮ`,'зңӢгҖӮ'],[`${s.sight[0]}гӮ’иҰӢгҒҫгҒ—гҒҹгҖӮ`,'зңӢдәҶгҖӮ'],[`${s.sight[0]}гӮ’иҰӢгҒҹгҒ„гҒ§гҒҷгҖӮ`,'жғізңӢгҖӮ']]})},
  {name:'д»ҖйәјжҷӮеҖҷеҺ»пјҹ',desc:'гҒ„гҒӨиЎҢгҒҚгҒҫгҒҷгҒӢ',note:'жҷӮй–“пјӢгҒ«пјӢиЎҢгҒҚгҒҫгҒҷгҖӮеӨҸгҖҒеҶ¬гҖҒжқҘйҖұзӯүеҸҜдёҚз”ЁгҒ«пјӣеҲқзҙҡз·ҙзҝ’еҸҜе…Ҳеӣәе®ҡз”ЁгҖҢгҒ«гҖҚгҖӮ',slots:['time','place'],build:s=>({q:['гҒ„гҒӨиЎҢгҒҚгҒҫгҒҷгҒӢгҖӮ','гҒ„гҒӨгҒ„гҒҚгҒҫгҒҷгҒӢгҖӮ','itsu ikimasu ka.','д»ҖйәјжҷӮеҖҷеҺ»пјҹ'],a:[`${s.time[0]}гҒ«${s.place[0]}гҒёиЎҢгҒҚгҒҫгҒҷгҖӮ`,`${s.time[1]}гҒ«${s.place[1]}гҒёгҒ„гҒҚгҒҫгҒҷгҖӮ`,`${s.time[2]} ni ${s.place[2]} e ikimasu.`,`${s.time[3]}еҺ»${s.place[3]}гҖӮ`],tense:[[`${s.time[0]}гҒ«иЎҢгҒҚгҒҫгҒҷгҖӮ`,'йӮЈеӨ©еҺ»гҖӮ'],[`${s.time[0]}гҒ«иЎҢгҒҚгҒҫгҒ—гҒҹгҖӮ`,'йӮЈеӨ©еҺ»дәҶгҖӮ'],[`${s.time[0]}гҒ«иЎҢгҒҚгҒҹгҒ„гҒ§гҒҷгҖӮ`,'жғійӮЈеӨ©еҺ»гҖӮ']]})},
  {name:'ж—…иЎҢжҖҺйәјжЁЈпјҹ',desc:'ж—…иЎҢгҒҜгҒ©гҒҶгҒ§гҒ—гҒҹгҒӢ',note:'гҒ©гҒҶгҒ§гҒ—гҒҹгҒӢпјқйҒҺеҺ»ж„ҹжғігҖӮеӣһзӯ”еёёз”ЁгҖҢгҒЁгҒҰгӮӮпјӢеҪўе®№и©һйҒҺеҺ»ејҸгҖҚгҖӮ',slots:['adjPast'],build:s=>({q:['ж—…иЎҢгҒҜгҒ©гҒҶгҒ§гҒ—гҒҹгҒӢгҖӮ','гӮҠгӮҮгҒ“гҒҶгҒҜгҒ©гҒҶгҒ§гҒ—гҒҹгҒӢгҖӮ','ryokou wa dou deshita ka.','ж—…иЎҢжҖҺйәјжЁЈпјҹ'],a:[`гҒЁгҒҰгӮӮ${s.adjPast[0]}гҒ§гҒҷгҖӮ`,`гҒЁгҒҰгӮӮ${s.adjPast[1]}гҒ§гҒҷгҖӮ`,`totemo ${s.adjPast[2]} desu.`,`йқһеёё${s.adjPast[3]}гҖӮ`],tense:[['жҘҪгҒ—гҒ„гҒ§гҒҷгҖӮ','зҸҫеңЁпјҡеҫҲй–ӢеҝғгҖӮ'],['жҘҪгҒ—гҒӢгҒЈгҒҹгҒ§гҒҷгҖӮ','йҒҺеҺ»пјҡеҫҲй–ӢеҝғгҖӮ'],['гҒҚгӮҢгҒ„гҒ§гҒҷгҖӮ','зҸҫеңЁпјҡеҫҲжјӮдә®гҖӮ'],['гҒҚгӮҢгҒ„гҒ§гҒ—гҒҹгҖӮ','йҒҺеҺ»пјҡеҫҲжјӮдә®гҖӮ']]})},
  {name:'жҸҗиӯ°пјҡвҖҰвҖҰжҖҺйәјжЁЈпјҹ',desc:'пҪһгҒҜгҒ©гҒҶгҒ§гҒҷгҒӢ',note:'еҗҚи©һпјӢгҒҜгҒ©гҒҶгҒ§гҒҷгҒӢгҖӮз”ЁдҫҶжҸҗиӯ°ж—ҘжңҹгҖҒең°й»һгҖҒйӨҗе»ізӯүгҖӮ',slots:['place','time'],build:s=>({q:[`${s.place[0]}гҒҜгҒ©гҒҶгҒ§гҒҷгҒӢгҖӮ`,`${s.place[1]}гҒҜгҒ©гҒҶгҒ§гҒҷгҒӢгҖӮ`,`${s.place[2]} wa dou desu ka.`,`гҖҢ${s.place[3]}гҖҚжҖҺйәјжЁЈпјҹ`],a:[`гҒ„гҒ„гҒ§гҒҷгҒӯгҖӮ${s.time[0]}гҒ«иЎҢгҒҚгҒҫгҒ—гӮҮгҒҶгҖӮ`,`гҒ„гҒ„гҒ§гҒҷгҒӯгҖӮ${s.time[1]}гҒ«гҒ„гҒҚгҒҫгҒ—гӮҮгҒҶгҖӮ`,`ii desu ne. ${s.time[2]} ni ikimashou.`,`еҘҪе•ҠгҖӮ${s.time[3]}еҺ»еҗ§гҖӮ`],tense:[[`${s.place[0]}гҒҜгҒ©гҒҶгҒ§гҒҷгҒӢгҖӮ`,'жҸҗиӯ°жҹҗең°гҖӮ'],[`${s.time[0]}гҒҜгҒ©гҒҶгҒ§гҒҷгҒӢгҖӮ`,'жҸҗиӯ°жҹҗжҷӮй–“гҖӮ'],[`${s.place[0]}гҒёиЎҢгҒҚгҒҫгҒ—гӮҮгҒҶгҖӮ`,'дёҖиө·еҺ»жҹҗең°еҗ§гҖӮ']]})}
];
let activePattern=0, slotState={place:0,time:0,action:0,food:0,sight:0,adjPast:0};
function renderPatternPicker(){
  $('patternPicker').innerHTML=patterns.map((p,i)=>`<button class="patternBtn ${i===activePattern?'active':''}" onclick="activePattern=${i};renderPatternPicker();renderDrill();"><div class="patternName">${p.name}</div><div class="patternDesc">${p.desc}</div></button>`).join('');
}
function renderDrill(){
  const p=patterns[activePattern]; $('patternBadge').textContent=p.name;
  $('slotControls').innerHTML=p.slots.map(slot=>`<div class="field"><label>${slot}</label><select onchange="slotState['${slot}']=parseInt(this.value);renderDrill();">${vocab[slot].map((v,i)=>`<option value="${i}" ${i===slotState[slot]?'selected':''}>${v[0]}пҪң${v[3]}</option>`).join('')}</select></div>`).join('');
  const s={}; p.slots.forEach(slot=>s[slot]=vocab[slot][slotState[slot]]);
  const out=p.build(s); const q=out.q,a=out.a;
  $('qJp').textContent=q[0];$('qKana').textContent=q[1];$('qRomaji').textContent=q[2];$('qZh').textContent=q[3];
  $('aJp').textContent=a[0];$('aKana').textContent=a[1];$('aRomaji').textContent=a[2];$('aZh').textContent=a[3];
  $('grammarNote').textContent=p.note;
  $('tenseTable').innerHTML='<tr><th>ж—Ҙж–Ү</th><th>дёӯж–Үз”Ёжі•</th></tr>'+out.tense.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
}
window.speechSynthesis.onvoiceschanged=()=>{};initTabs();loadScenes();renderPatternPicker();renderDrill();
</script>
