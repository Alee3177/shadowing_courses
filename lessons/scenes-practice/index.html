<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>日本旅行三場面跟讀＋綜合問答句型練習</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--pri:#2563eb;--pri2:#dbeafe;--accent:#f97316;--ok:#16a34a;--shadow:0 12px 32px rgba(15,23,42,.10);--radius:22px}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eff6ff 0,#f8fafc 260px);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC","Noto Sans JP",Segoe UI,sans-serif;line-height:1.55}.wrap{max-width:1120px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 40px}.hero{background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border:1px solid rgba(226,232,240,.8);border-radius:28px;padding:18px;box-shadow:var(--shadow);position:sticky;top:8px;z-index:20}.hero h1{font-size:clamp(22px,4vw,36px);margin:0 0 4px}.subtitle{color:var(--muted);font-size:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:700;cursor:pointer}.tab.active{background:var(--pri);border-color:var(--pri);color:#fff}.panel{display:none;margin-top:18px}.panel.active{display:block}.grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.main{padding:20px;min-height:260px}.badge{display:inline-flex;align-items:center;gap:6px;background:var(--pri2);color:#1e40af;border-radius:999px;padding:5px 10px;font-weight:800;font-size:13px}.jp{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:.02em;margin:18px 0 8px}.kana{font-size:clamp(18px,3vw,28px);font-weight:700;color:#334155}.romaji{font-size:clamp(16px,2.5vw,22px);color:#475569;margin-top:8px}.zh{font-size:clamp(18px,3vw,26px);font-weight:800;color:#0f766e;margin-top:10px}.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.btn,select{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 12px;font-weight:800;cursor:pointer}.btn.primary{background:var(--pri);border-color:var(--pri);color:#fff}.btn.orange{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.btn.green{background:#f0fdf4;border-color:#bbf7d0;color:#166534}.status{font-size:14px;color:var(--muted);margin-top:10px}.list{max-height:540px;overflow:auto;padding:10px}.row{padding:12px;border-radius:16px;border:1px solid transparent;cursor:pointer;margin-bottom:8px;background:#fff}.row:hover{border-color:#bfdbfe}.row.active{background:#eff6ff;border-color:#60a5fa;box-shadow:0 0 0 3px rgba(37,99,235,.12)}.row .rjp{font-weight:900;font-size:18px}.row .rmeta{font-size:13px;color:var(--muted)}.small{font-size:13px;color:var(--muted)}.sectionTitle{font-size:24px;margin:24px 0 12px}.drillGrid{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px}.picker{padding:16px}.patternBtn{width:100%;text-align:left;margin-bottom:8px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;cursor:pointer}.patternBtn.active{border-color:var(--pri);background:#eff6ff}.patternName{font-weight:900}.patternDesc{font-size:13px;color:var(--muted)}.drillCard{padding:18px}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:14px 0}.field label{display:block;font-size:13px;color:#475569;font-weight:800;margin-bottom:4px}.field select{width:100%}.qa{display:grid;grid-template-columns:1fr;gap:12px}.bubble{border:1px solid var(--line);border-radius:20px;padding:14px;background:#fff}.bubble.q{background:#f8fafc}.bubble .label{font-size:13px;font-weight:900;color:var(--accent);margin-bottom:4px}.table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px;overflow:hidden;border-radius:18px;border:1px solid var(--line)}.table th,.table td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}.table th{background:#f8fafc;text-align:left}.table tr:last-child td{border-bottom:0}.note{background:#fffbeb;border:1px solid #fde68a;border-radius:18px;padding:12px;margin-top:12px;color:#78350f}@media(max-width:900px){.grid,.drillGrid{grid-template-columns:1fr}.hero{position:relative;top:0}.list{max-height:50vh}.formGrid{grid-template-columns:1fr}.jp{font-size:30px}.main{min-height:auto}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>日本旅行三場面跟讀＋綜合問答句型練習</h1>
    <div class="subtitle">三個場景 JSON 分開載入；綜合題支援替換地點、動作、食物、季節與時態。</div>
    <div class="tabs" id="tabs"></div>
  </div>

  <section id="shadowPanel" class="panel active">
    <div class="grid">
      <div class="card main">
        <span class="badge" id="sceneBadge">場面</span>
        <div class="jp" id="jp">讀取中...</div>
        <div class="kana" id="kana"></div>
        <div class="romaji" id="romaji"></div>
        <div class="zh" id="zh"></div>
        <div class="controls">
          <button class="btn primary" id="playBtn">解鎖／開始跟讀</button>
          <button class="btn" id="pauseBtn">暫停</button>
          <button class="btn" id="prevBtn">上一句</button>
          <button class="btn" id="nextBtn">下一句</button>
          <button class="btn orange" id="resetBtn">重置</button>
          <select id="speed"><option value="0.75">0.75x</option><option value="0.85">0.85x</option><option value="1" selected>1.00x</option><option value="1.1">1.10x</option></select>
          <select id="delay"><option value="800">跟讀延遲 0.8秒</option><option value="1200" selected>跟讀延遲 1.2秒</option><option value="1600">跟讀延遲 1.6秒</option></select>
        </div>
        <div class="status" id="status">模式：先聽日文 → 停頓 → 自己跟讀。</div>
      </div>
      <div class="card list" id="list"></div>
    </div>
  </section>

  <section id="drillPanel" class="panel">
    <h2 class="sectionTitle">綜合題：問答句型＋可替換時態應用</h2>
    <div class="drillGrid">
      <div class="card picker" id="patternPicker"></div>
      <div class="card drillCard">
        <span class="badge" id="patternBadge">句型</span>
        <div class="formGrid" id="slotControls"></div>
        <div class="qa">
          <div class="bubble q">
            <div class="label">問句 Question</div>
            <div class="jp" id="qJp"></div><div class="kana" id="qKana"></div><div class="romaji" id="qRomaji"></div><div class="zh" id="qZh"></div>
            <button class="btn green" onclick="speakText(document.getElementById('qJp').textContent)">播放問句</button>
          </div>
          <div class="bubble">
            <div class="label">回答 Answer</div>
            <div class="jp" id="aJp"></div><div class="kana" id="aKana"></div><div class="romaji" id="aRomaji"></div><div class="zh" id="aZh"></div>
            <button class="btn green" onclick="speakText(document.getElementById('aJp').textContent)">播放回答</button>
          </div>
        </div>
        <div class="note" id="grammarNote"></div>
        <table class="table" id="tenseTable"></table>
      </div>
    </div>
  </section>
</div>
<script>
const sceneFiles = [
  {name:'第一場面：旅行の計画', file:'scene1_plan.json'},
  {name:'第二場面：帰国後の感想', file:'scene2_impressions.json'},
  {name:'第三場面：次の計画', file:'scene3_next_plan.json'},
  {name:'綜合問答句型', drill:true}
];
let scenes=[], currentScene=0, current=0, playing=false, paused=false, stopFlag=false;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function $(id){return document.getElementById(id)}
function initTabs(){
  $('tabs').innerHTML = sceneFiles.map((x,i)=>`<button class="tab ${i===0?'active':''}" onclick="switchTab(${i})">${x.name}</button>`).join('');
}
async function loadScenes(){
  for(const s of sceneFiles.filter(x=>!x.drill)){
    const res = await fetch(s.file + '?v=' + Date.now());
    scenes.push(await res.json());
  }
  renderScene();
}
function switchTab(i){
  document.querySelectorAll('.tab').forEach((b,idx)=>b.classList.toggle('active',idx===i));
  if(sceneFiles[i].drill){$('shadowPanel').classList.remove('active');$('drillPanel').classList.add('active');renderPatternPicker();renderDrill();return;}
  $('drillPanel').classList.remove('active');$('shadowPanel').classList.add('active');currentScene=i;current=0;stopAll();renderScene();
}
function renderScene(){
  const scene=scenes[currentScene]; if(!scene) return;
  $('sceneBadge').textContent=`${scene.title}｜${scene.titleZh}`;
  renderCurrent();
  $('list').innerHTML=scene.items.map((x,i)=>`<div class="row ${i===current?'active':''}" id="row${i}" onclick="jumpTo(${i})"><div class="rmeta">${i+1}. ${x.speaker}</div><div class="rjp">${x.jp}</div><div class="rmeta">${x.kana}<br>${x.romaji}<br>${x.zh}</div></div>`).join('');
}
function renderCurrent(){
  const item=scenes[currentScene].items[current];
  $('jp').textContent=`${item.speaker}：${item.jp}`;$('kana').textContent=item.kana;$('romaji').textContent=item.romaji;$('zh').textContent=item.zh;
  document.querySelectorAll('.row').forEach((r,i)=>r.classList.toggle('active',i===current));
  const row=$('row'+current); if(row) row.scrollIntoView({block:'center',behavior:'smooth'});
}
function pickVoice(){
  const voices=speechSynthesis.getVoices();
  return voices.find(v=>v.lang==='ja-JP' && /Nanami|Female|Kyoko|Google/.test(v.name)) || voices.find(v=>v.lang==='ja-JP') || null;
}
function speakText(text){
  return new Promise(resolve=>{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/^[A-Zみんな]+：/,''));
    u.lang='ja-JP'; u.rate=parseFloat($('speed')?.value||'1'); u.pitch=1.02; u.voice=pickVoice();
    u.onend=()=>resolve(); u.onerror=()=>resolve(); speechSynthesis.speak(u);
  });
}
async function startShadow(){
  if(playing){ stopAll(); await sleep(100); }
  playing=true; paused=false; stopFlag=false; $('status').textContent='跟讀中：先聽原音，停頓後請開口跟讀。';
  while(current < scenes[currentScene].items.length && !stopFlag){
    renderCurrent();
    const item=scenes[currentScene].items[current];
    await speakText(`${item.speaker}：${item.jp}`);
    await waitPauseOrDelay(parseInt($('delay').value,10));
    if(stopFlag) break;
    $('status').textContent=`第 ${current+1} 句：請跟讀 → ${item.jp}`;
    await waitPauseOrDelay(1800);
    current++;
  }
  playing=false;
  if(!stopFlag){ current=Math.max(0,scenes[currentScene].items.length-1); renderCurrent(); $('status').textContent='完成一輪。可切換場景或再次開始。'; }
}
async function waitPauseOrDelay(ms){
  const step=100; let t=0;
  while(t<ms && !stopFlag){ if(!paused){t+=step;} await sleep(step); }
}
function stopAll(){stopFlag=true; playing=false; paused=false; speechSynthesis.cancel(); $('pauseBtn').textContent='暫停';}
function jumpTo(i){current=i; renderCurrent(); if(playing){stopAll(); setTimeout(startShadow,120)}}
$('playBtn').onclick=startShadow;$('pauseBtn').onclick=()=>{paused=!paused; if(paused){speechSynthesis.pause();$('pauseBtn').textContent='繼續';$('status').textContent='已暫停。';}else{speechSynthesis.resume();$('pauseBtn').textContent='暫停';$('status').textContent='繼續跟讀。';}};
$('prevBtn').onclick=()=>{current=Math.max(0,current-1);renderCurrent()};$('nextBtn').onclick=()=>{current=Math.min(scenes[currentScene].items.length-1,current+1);renderCurrent()};$('resetBtn').onclick=()=>{stopAll();current=0;renderCurrent();$('status').textContent='已重置。'};

const vocab = {
  place:[['日本','にほん','Nihon','日本'],['京都','きょうと','Kyouto','京都'],['大阪','おおさか','Oosaka','大阪'],['北海道','ほっかいどう','Hokkaidou','北海道']],
  time:[['5月20日','ごがつはつか','gogatsu hatsuka','5月20日'],['来週','らいしゅう','raishuu','下週'],['夏','なつ','natsu','夏天'],['冬','ふゆ','fuyu','冬天']],
  action:[['旅行に行く','りょこうにいく','ryokou ni iku','去旅行'],['買い物をする','かいものをする','kaimono o suru','購物'],['温泉に入る','おんせんにはいる','onsen ni hairu','泡溫泉'],['写真を撮る','しゃしんをとる','shashin o toru','拍照'],['スキーをする','スキーをする','sukii o suru','滑雪']],
  food:[['お寿司','おすし','osushi','壽司'],['カニ','カニ','kani','螃蟹'],['おいしいもの','おいしいもの','oishii mono','好吃的東西'],['料理','りょうり','ryouri','料理']],
  sight:[['桜','さくら','sakura','櫻花'],['雪','ゆき','yuki','雪'],['きれいな景色','きれいなけしき','kirei na keshiki','漂亮的風景'],['大阪城','おおさかじょう','Oosakajou','大阪城']],
  adjPast:[['楽しかった','たのしかった','tanoshikatta','很開心'],['おいしかった','おいしかった','oishikatta','很好吃'],['きれいでした','きれいでした','kirei deshita','很漂亮'],['気持ち良かった','きもちよかった','kimochi yokatta','很舒服']]
};
const patterns=[
  {name:'想去哪裡？',desc:'どこへ行きたいですか',note:'地點＋へ＋行きたいです。用於表達想去某地。',slots:['place'],build:s=>({q:['どこへ行きたいですか。','どこへいきたいですか。','doko e ikitai desu ka.','想去哪裡？'],a:[`${s.place[0]}へ行きたいです。`,`${s.place[1]}へいきたいです。`,`${s.place[2]} e ikitai desu.`,`想去${s.place[3]}。`],tense:[[`${s.place[0]}へ行きます。`,'去。'],[`${s.place[0]}へ行きました。`,'去了。'],[`${s.place[0]}へ行きたいです。`,'想去。'],[`${s.place[0]}へ行きましょう。`,'一起去吧。']]})},
  {name:'想做什麼？',desc:'何をしたいですか',note:'動詞ます形去掉ます＋たいです。します → したいです。',slots:['action'],build:s=>{const a=s.action[0].replace('する','したい').replace('行く','行きたい').replace('入る','入りたい').replace('撮る','撮りたい');const k=s.action[1].replace('する','したい').replace('いく','いきたい').replace('はいる','はいりたい').replace('とる','とりたい');const r=s.action[2].replace('suru','shitai').replace('iku','ikitai').replace('hairu','hairitai').replace('toru','toritai');return {q:['何をしたいですか。','なにをしたいですか。','nani o shitai desu ka.','想做什麼？'],a:[a+'です。',k+'です。',r+' desu.',`想${s.action[3]}。`],tense:[[s.action[0]+'ます。','要做。'],[s.action[0].replace('する','しました').replace('行く','行きました').replace('入る','入りました').replace('撮る','撮りました')+'。','做了。'],[a+'です。','想做。']]}}},
  {name:'想吃什麼？',desc:'何を食べたいですか',note:'食べたいです＝想吃。食べました＝吃了。',slots:['food'],build:s=>({q:['何を食べたいですか。','なにをたべたいですか。','nani o tabetai desu ka.','想吃什麼？'],a:[`${s.food[0]}を食べたいです。`,`${s.food[1]}をたべたいです。`,`${s.food[2]} o tabetai desu.`,`想吃${s.food[3]}。`],tense:[[`${s.food[0]}を食べます。`,'吃。'],[`${s.food[0]}を食べました。`,'吃了。'],[`${s.food[0]}を食べたいです。`,'想吃。']]})},
  {name:'想看什麼？',desc:'何を見たいですか',note:'見る → 見ます → 見たいです；過去式是見ました。',slots:['sight'],build:s=>({q:['何を見たいですか。','なにをみたいですか。','nani o mitai desu ka.','想看什麼？'],a:[`${s.sight[0]}を見たいです。`,`${s.sight[1]}をみたいです。`,`${s.sight[2]} o mitai desu.`,`想看${s.sight[3]}。`],tense:[[`${s.sight[0]}を見ます。`,'看。'],[`${s.sight[0]}を見ました。`,'看了。'],[`${s.sight[0]}を見たいです。`,'想看。']]})},
  {name:'什麼時候去？',desc:'いつ行きますか',note:'時間＋に＋行きます。夏、冬、来週等可不用に；初級練習可先固定用「に」。',slots:['time','place'],build:s=>({q:['いつ行きますか。','いついきますか。','itsu ikimasu ka.','什麼時候去？'],a:[`${s.time[0]}に${s.place[0]}へ行きます。`,`${s.time[1]}に${s.place[1]}へいきます。`,`${s.time[2]} ni ${s.place[2]} e ikimasu.`,`${s.time[3]}去${s.place[3]}。`],tense:[[`${s.time[0]}に行きます。`,'那天去。'],[`${s.time[0]}に行きました。`,'那天去了。'],[`${s.time[0]}に行きたいです。`,'想那天去。']]})},
  {name:'旅行怎麼樣？',desc:'旅行はどうでしたか',note:'どうでしたか＝過去感想。回答常用「とても＋形容詞過去式」。',slots:['adjPast'],build:s=>({q:['旅行はどうでしたか。','りょこうはどうでしたか。','ryokou wa dou deshita ka.','旅行怎麼樣？'],a:[`とても${s.adjPast[0]}です。`,`とても${s.adjPast[1]}です。`,`totemo ${s.adjPast[2]} desu.`,`非常${s.adjPast[3]}。`],tense:[['楽しいです。','現在：很開心。'],['楽しかったです。','過去：很開心。'],['きれいです。','現在：很漂亮。'],['きれいでした。','過去：很漂亮。']]})},
  {name:'提議：……怎麼樣？',desc:'～はどうですか',note:'名詞＋はどうですか。用來提議日期、地點、餐廳等。',slots:['place','time'],build:s=>({q:[`${s.place[0]}はどうですか。`,`${s.place[1]}はどうですか。`,`${s.place[2]} wa dou desu ka.`,`「${s.place[3]}」怎麼樣？`],a:[`いいですね。${s.time[0]}に行きましょう。`,`いいですね。${s.time[1]}にいきましょう。`,`ii desu ne. ${s.time[2]} ni ikimashou.`,`好啊。${s.time[3]}去吧。`],tense:[[`${s.place[0]}はどうですか。`,'提議某地。'],[`${s.time[0]}はどうですか。`,'提議某時間。'],[`${s.place[0]}へ行きましょう。`,'一起去某地吧。']]})}
];
let activePattern=0, slotState={place:0,time:0,action:0,food:0,sight:0,adjPast:0};
function renderPatternPicker(){
  $('patternPicker').innerHTML=patterns.map((p,i)=>`<button class="patternBtn ${i===activePattern?'active':''}" onclick="activePattern=${i};renderPatternPicker();renderDrill();"><div class="patternName">${p.name}</div><div class="patternDesc">${p.desc}</div></button>`).join('');
}
function renderDrill(){
  const p=patterns[activePattern]; $('patternBadge').textContent=p.name;
  $('slotControls').innerHTML=p.slots.map(slot=>`<div class="field"><label>${slot}</label><select onchange="slotState['${slot}']=parseInt(this.value);renderDrill();">${vocab[slot].map((v,i)=>`<option value="${i}" ${i===slotState[slot]?'selected':''}>${v[0]}｜${v[3]}</option>`).join('')}</select></div>`).join('');
  const s={}; p.slots.forEach(slot=>s[slot]=vocab[slot][slotState[slot]]);
  const out=p.build(s); const q=out.q,a=out.a;
  $('qJp').textContent=q[0];$('qKana').textContent=q[1];$('qRomaji').textContent=q[2];$('qZh').textContent=q[3];
  $('aJp').textContent=a[0];$('aKana').textContent=a[1];$('aRomaji').textContent=a[2];$('aZh').textContent=a[3];
  $('grammarNote').textContent=p.note;
  $('tenseTable').innerHTML='<tr><th>日文</th><th>中文用法</th></tr>'+out.tense.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
}
window.speechSynthesis.onvoiceschanged=()=>{};initTabs();loadScenes();renderPatternPicker();renderDrill();
</script>
</body>
</html>
