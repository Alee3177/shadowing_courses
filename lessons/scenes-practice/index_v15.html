px minmax(0,1fr);gap:16px}.picker{padding:16px}.patternBtn{width:100%;text-align:left;margin-bottom:8px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;cursor:pointer}.patternBtn.active{border-color:var(--pri);background:#eff6ff}.patternName{font-weight:900}.patternDesc{font-size:13px;color:var(--muted)}.drillCard{padding:18px}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:14px 0}.field label{display:block;font-size:13px;color:#475569;font-weight:800;margin-bottom:4px}.field select{width:100%}.qa{display:grid;grid-template-columns:1fr;gap:12px}.bubble{border:1px solid var(--line);border-radius:20px;padding:14px;background:#fff}.bubble.q{background:#f8fafc}.bubble .label{font-size:13px;font-weight:900;color:var(--accent);margin-bottom:4px}.table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px;overflow:hidden;border-radius:18px;border:1px solid var(--line)}.table th,.table td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}.table th{background:#f8fafc;text-align:left}.table tr:last-child td{border-bottom:0}.note{background:#fffbeb;border:1px solid #fde68a;border-radius:18px;padding:12px;margin-top:12px;color:#78350f}@media(max-width:900px){.grid,.drillGrid{grid-template-columns:1fr}.hero{position:relative;top:0}.list{max-height:50vh}.formGrid{grid-template-columns:1fr}.jp{font-size:30px}.main{min-height:auto}}

<div class="wrap">
  <div class="hero">

  </div>

  <section id="shadowPanel" class="panel active">

 desu.","zh":"非常舒服。","audio":"audio/scene2_005.mp3"},{"speaker":"C","jp":"私は大阪城で桜を見ました。","kana":"わたしはおおさかじょうでさくらをみました。","romaji":"watashi wa Oosakajou de sakura o mimashita.","zh":"我在大阪城看了櫻花。","audio":"audio/scene2_006.mp3"},{"speaker":"C","jp":"とてもきれいでした。","kana":"とてもきれいでした。","romaji":"totemo kirei deshita.","zh":"非常漂亮。","audio":"audio/scene2_007.mp3"},{"speaker":"D","jp":"私は写真をたくさん撮りました。","kana":"わたしはしゃしんをたくさんとりました。","romaji":"watashi wa shashin o takusan torimashita.","zh":"我拍了很多照片。","audio":"audio/scene2_008.mp3"},{"speaker":"D","jp":"いい思い出になりました。","kana":"いいおもいでになりました。","romaji":"ii omoide ni narimashita.","zh":"成為了美好的回憶。","audio":"audio/scene2_009.mp3"},{"speaker":"E","jp":"私はお寿司を食べました。","kana":"わたしはおすしをたべました。","romaji":"watashi wa osushi o tabemashita.","zh":"我吃了壽司。","audio":"audio/scene2_010.mp3"},{"speaker":"E","jp":"少し高かったですが、とてもおいしかったです。","kana":"すこしたかかったですが、とてもおいしかったです。","romaji":"sukoshi takakatta desu ga, totemo oishikatta desu.","zh":"雖然有點貴，但是非常好吃。","audio":"audio/scene2_011.mp3"}]},{"id":"scene3_next_plan","title":"第三場面：次の計画","titleKana":"だいさんばめん：つぎのけいかく","titleRomaji":"daisan bamen: tsugi no keikaku","titleZh":"第三場面：下一次的計畫","items":[{"speaker":"A","jp":"日本旅行は本当に楽しかったですね。","kana":"にほんりょこうはほんとうにたのしかったですね。","romaji":"Nihon ryokou wa hontou ni tanoshikatta desu ne.","zh":"日本旅行真的很開心呢。","audio":"audio/scene3_001.mp3"},{"speaker":"B","jp":"そうですね。いい旅行でした。","kana":"そうですね。いいりょこうでした。","romaji":"sou desu ne. ii ryokou deshita.","zh":"是啊。是一次很好的旅行。","audio":"audio/scene3_002.mp3"},{"speaker":"B","jp":"また日本へ旅行に行きたいです。","kana":"またにほんへりょこうにいきたいです。","romaji":"mata Nihon e ryokou ni ikitai desu.","zh":"還想再去日本旅行。","audio":"audio/scene3_003.mp3"},{"speaker":"C","jp":"次はどこへ行きたいですか。","kana":"つぎはどこへいきたいですか。","romaji":"tsugi wa doko e ikitai desu ka.","zh":"下一次想去哪裡？","audio":"audio/scene3_004.mp3"},{"speaker":"D","jp":"私は北海道へ行きたいです。","kana":"わたしはほっかいどうへいきたいです。","romaji":"watashi wa Hokkaidou e ikitai desu.","zh":"我想去北海道。","audio":"audio/scene3_005.mp3"},{"speaker":"E","jp":"私も北海道へ行きたいです。","kana":"わたしもほっかいどうへいきたいです。","romaji":"watashi mo Hokkaidou e ikitai desu.","zh":"我也想去北海道。","audio":"audio/scene3_006.mp3"},{"speaker":"E","jp":"またおいしいものを食べたいです。","kana":"またおいしいものをたべたいです。","romaji":"mata oishii mono o tabetai desu.","zh":"還想再吃好吃的東西。","audio":"audio/scene3_007.mp3"},{"speaker":"A","jp":"いいですね。","kana":"いいですね。","romaji":"ii desu ne.","zh":"好啊。","audio":"audio/scene3_008.mp3"},{"speaker":"A","jp":"私もおいしいカニを食べたいです。","kana":"わたしもおいしいカニをたべたいです。","romaji":"watashi mo oishii kani o tabetai desu.","zh":"我也想吃好吃的螃蟹。","audio":"audio/scene3_009.mp3"},{"speaker":"B","jp":"私はまた温泉に入りたいです。","kana":"わたしはまたおんせんにはいりたいです。","romaji":"watashi wa mata onsen ni hairitai desu.","zh":"我還想再泡溫泉。","audio":"audio/scene3_010.mp3"},{"speaker":"C","jp":"私は雪を見たいです。","kana":"わたしはゆきをみたいです。","romaji":"watashi wa yuki o mitai desu.","zh":"我想看雪。","audio":"audio/scene3_011.mp3"},{"speaker":"D","jp":"私はスキーをしたいです。","kana":"わたしはスキーをしたいです。","romaji":"watashi wa sukii o shitai desu.","zh":"我想滑雪。","audio":"audio/scene3_012.mp3"},{"speaker":"E","jp":"じゃあ、次は冬に北海道へ行きましょう。","kana":"じゃあ、つぎはふゆにほっかいどうへいきましょう。","romaji":"jaa, tsugi wa fuyu ni Hokkaidou e ikimashou.","zh":"那麼，下一次冬天去北海道吧。","audio":"audio/scene3_013.mp3"},{"speaker":"みんな","jp":"はい！冬の北海道、楽しみです！","kana":"はい！ふゆのほっかいどう、たのしみです！","romaji":"hai! fuyu no Hokkaidou, tanoshimi desu!","zh":"好！冬天的北海道，很期待！","audio":"audio/scene3_014.mp3"}]}];
let scenes=[], currentScene=0, current=0, playing=false, paused=false, stopFlag=false;
let playToken=0, activeAudioResolve=null;
const audioPlayer = new Audio();
audioPlayer.preload = 'auto';
audioPlayer.setAttribute('playsinline','');
audioPlayer.setAttribute('webkit-playsinline','');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function $(id){return document.getElementById(id)}
function initTabs(){
  $('tabs').innerHTML = sceneFiles.map((x,i)=>`<button class="tab ${i===0?'active':''}" onclick="switchTab(${i})">${x.name}</button>`).join('');
}
function addVersion(url){
  // MP3 單獨網址已確認可播放；音檔路徑保持乾淨，不加 ?v=，避免部分手機/LINE WebView 無法載入 metadata。
  return url;
}
function cloneData(obj){
  return JSON.parse(JSON.stringify(obj));
}
function normalizeScene(data, fallbackName){
  if(Array.isArray(data)) return {title:fallbackName, titleZh:'', items:data};
  if(data && Array.isArray(data.items)) return data;
  throw new Error(`${fallbackName} 內嵌資料內找不到 items 陣列`);
}
function ensureAudioPaths(scene, sceneIndex){
  const prefix = `scene${sceneIndex + 1}`;
  scene.items.forEach((item, idx)=>{
    if(!item.audio && !item.file && !item.mp3){
      item.audio = `audio/${prefix}_${String(idx+1).padStart(3,'0')}.mp3`;
    }
  });
  return scene;
}
async function loadScenes(){
  try{
    scenes = EMBEDDED_SCENES.map((data,idx)=>ensureAudioPaths(normalizeScene(cloneData(data), sceneFiles[idx].name), idx));
    renderScene();
    $('status').textContent='若 LINE 內無法播放，請點右上角 ⋮，選擇「以瀏覽器開啟」。外部瀏覽器可直接按「解鎖／開始跟讀」。';
  }catch(err){
    $('jp').textContent='課文資料載入失敗';
    $('kana').textContent='';
    $('romaji').textContent=err.message || String(err);
    $('zh').textContent='';
    $('status').textContent='';
    console.error(err);
  }
}
function switchTab(i){
  document.querySelectorAll('.tab').forEach((b,idx)=>b.classList.toggle('active',idx===i));
  if(sceneFiles[i].drill){$('shadowPanel').classList.remove('active');$('drillPanel').classList.add('active');renderPatternPicker();renderDrill();return;}
  $('drillPanel').classList.remove('active');$('shadowPanel').classList.add('active');currentScene=i;current=0;stopAll();renderScene();
}
function renderScene(){
  const scene=scenes[currentScene]; if(!scene) return;
  $('sceneBadge').textContent=`${scene.title || sceneFiles[currentScene].name}｜${scene.titleZh || ''}`;
  renderCurrent();
  $('list').innerHTML=scene.items.map((x,i)=>`<div class="row ${i===current?'active':''}" id="row${i}" onclick="jumpTo(${i})"><div class="rmeta">${i+1}. ${x.speaker || ''}</div><div class="rjp">${x.jp || x.text || ''}</div><div class="rmeta">${x.kana || ''}<br>${x.romaji || ''}<br>${x.zh || ''}</div></div>`).join('');
}
function renderCurrent(){
  const item=scenes[currentScene].items[current];
  $('jp').textContent=`${item.speaker || ''}${item.speaker ? '：' : ''}${item.jp || item.text || ''}`;
  $('kana').textContent=item.kana || '';$('romaji').textContent=item.romaji || '';$('zh').textContent=item.zh || '';
  document.querySelectorAll('.row').forEach((r,i)=>r.classList.toggle('active',i===current));
  const row=$('row'+current);
  const listEl=$('list');
  if(row && listEl && listEl.contains(row)){
    const targetTop = row.offsetTop - (listEl.clientHeight - row.offsetHeight) / 2;
    listEl.scrollTo({top: Math.max(0, targetTop), behavior:'smooth'});
  }
}
function pickVoice(){
  const voices=speechSynthesis.getVoices();
  return voices.find(v=>v.lang==='ja-JP' && /Nanami|Female|Kyoko|Google/.test(v.name)) || voices.find(v=>v.lang==='ja-JP') || null;
}
function cleanSpeakText(text){
  return String(text || '').replace(/^[A-Zみんな]+：/,'');
}
function speakText(text){
  return new Promise(resolve=>{
    const token=++playToken;
    audioPlayer.pause();
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(cleanSpeakText(text));
    u.lang='ja-JP'; u.rate=parseFloat($('speed')?.value||'1'); u.pitch=1.02; u.voice=pickVoice();
    u.onend=()=>{ if(token===playToken) resolve(); };
    u.onerror=()=>{ if(token===playToken) resolve(); };
    speechSynthesis.speak(u);
  });
}
function playMp3(src){
  return new Promise((resolve,reject)=>{
    const token=++playToken;
    activeAudioResolve=resolve;
    speechSynthesis.cancel();
    audioPlayer.pause();
    audioPlayer.currentTime=0;
    audioPlayer.playbackRate=parseFloat($('speed')?.value||'1');
    audioPlayer.onended=()=>{ if(token===playToken){ activeAudioResolve=null; resolve(); } };
    audioPlayer.onerror=()=>{ if(token===playToken){ activeAudioResolve=null; reject(new Error('MP3播放失敗：'+src)); } };
    audioPlayer.src = addVersion(src);
    audioPlayer.load();
    audioPlayer.play().catch(err=>{
      if(token===playToken){ activeAudioResolve=null; reject(err); }
    });
  });
}
async function playVoice(item){
  const text = `${item.speaker || ''}${item.speaker ? '：' : ''}${item.jp || item.text || ''}`;
  const src = item.audio || item.file || item.mp3 || '';
  if(src){
    try{
      $('status').textContent=`第 ${current+1} 句：播放 MP3 原音。`;
      await playMp3(src);
      return;
    }catch(err){
      console.warn(err);
      if(stopFlag) return;
      $('status').textContent=`第 ${current+1} 句：MP3未播放，改用 TTS；若在 LINE 內無聲，請用外部瀏覽器開啟。`;
      await sleep(250);
    }
  }else{
    $('status').textContent=`第 ${current+1} 句：使用 TTS。`;
  }
  await speakText(text);
}
async function startShadow(){
  if(playing){ stopAll(); await sleep(100); }
  if(!scenes[currentScene] || !scenes[currentScene].items) return;
  playing=true; paused=false; stopFlag=false; $('mainCard')?.classList.add('is-playing'); $('mainCard')?.classList.remove('is-paused'); $('status').textContent='跟讀中：先聽原音，停頓後請開口跟讀。';
  while(current < scenes[currentScene].items.length && !stopFlag){
    renderCurrent();
    const item=scenes[currentScene].items[current];
    await playVoice(item);
    await waitPauseOrDelay(parseInt($('delay').value,10));
    if(stopFlag) break;
    $('status').textContent=`第 ${current+1} 句：請跟讀 → ${item.jp || item.text || ''}`;
    await waitPauseOrDelay(1800);
    current++;
  }
  playing=false;
  if(!stopFlag){ current=Math.max(0,scenes[currentScene].items.length-1); renderCurrent(); $('status').textContent='完成一輪。可切換場景或再次開始。'; }
}
async function waitPauseOrDelay(ms){
  const step=100; let t=0;
  while(t<ms && !stopFlag){ if(!paused){t+=step;} await sleep(step); }
}
function stopAll(){
  stopFlag=true; playing=false; paused=false; playToken++;
  speechSynthesis.cancel();
  audioPlayer.pause();
  audioPlayer.removeAttribute('src');
  try{ audioPlayer.load(); }catch(e){}
  if(activeAudioResolve){ activeAudioResolve(); activeAudioResolve=null; }
  $('pauseBtn').textContent='暫停';
  $('mainCard')?.classList.remove('is-playing','is-paused');
}

function jumpTo(i){current=i; renderCurrent(); if(playing){stopAll(); setTimeout(startShadow,120)}}
$('playBtn').onclick=startShadow;
function togglePauseResume(){
  if(!playing && !paused) return;
  paused=!paused;
  if(paused){
    audioPlayer.pause();
    speechSynthesis.pause();
    $('pauseBtn').textContent='繼續';
    $('status').textContent='已暫停。';
    $('mainCard')?.classList.remove('is-playing');
    $('mainCard')?.classList.add('is-paused');
  }else{
    if(audioPlayer.src && audioPlayer.paused) audioPlayer.play().catch(()=>{});
    speechSynthesis.resume();
    $('pauseBtn').textContent='暫停';
    $('status').textContent='繼續跟讀。';
    $('mainCard')?.classList.add('is-playing');
    $('mainCard')?.classList.remove('is-paused');
  }
}
$('pauseBtn').onclick=togglePauseResume;
$('mainCard').addEventListener('click',(ev)=>{
  if(ev.target.closest('button,select,.controls')) return;
  togglePauseResume();
});
$('prevBtn').onclick=()=>{current=Math.max(0,current-1);renderCurrent()};$('nextBtn').onclick=()=>{current=Math.min(scenes[currentScene].items.length-1,current+1);renderCurrent()};$('resetBtn').onclick=()=>{stopAll();current=0;renderCurrent();$('status').textContent='已重置。'};

const vocab = {

  time:[['5月20日','ごがつはつか','gogatsu hatsuka','5月20日'],['来週','らいしゅう','raishuu','下週'],['夏','なつ','natsu','夏天'],['冬','ふゆ','fuyu','冬天']],
  action:[['旅行に行く','りょこうにいく','ryokou ni iku','去旅行'],['買い物をする','かいものをする','kaimono o suru','購物'],['温泉に入る','おんせんにはいる','onsen ni hairu','泡溫泉'],['写真を撮る','しゃしんをとる','shashin o toru','拍照'],['スキーをする','スキーをする','sukii o suru','滑雪']],
  food:[['お寿司','おすし','osushi','壽司'],['カニ','カニ','kani','螃蟹'],['おいしいもの','おいしいもの','oishii mono','好吃的東西'],['料理','りょうり','ryouri','料理']],
  sight:[['桜','さくら','sakura','櫻花'],['雪','ゆき','yuki','雪'],['きれいな景色','きれいなけしき','kirei na keshiki','漂亮的風景'],['大阪城','おおさかじょう','Oosakajou','大阪城']],
  adjPast:[['楽しかった','たのしかった','tanoshikatta','很開心'],['おいしかった','おいしかった','oishikatta','很好吃'],['きれいでした','きれいでした','kirei deshita','很漂亮'],['気持ち良かった','きもちよかった','kimochi yokatta','很舒服']]
};
const patterns=[
  {name:'想去哪裡？',desc:'どこへ行きたいですか',note:'地點＋へ＋行きたいです。用於表達想去某地。',slots:['place'],build:s=>({q:['どこへ行きたいですか。','どこへいきたいですか。','doko e ikitai desu ka.','想去哪裡？'],a:[`${s.place[0]}へ行きたいです。`,`${s.place[1]}へいきたいです。`,`${s.place[2]} e ikitai desu.`,`想去${s.place[3]}。`],tense:[[`${s.place[0]}へ行きます。`,'去。'],[`${s.place[0]}へ行きました。`,'去了。'],[`${s.place[0]}へ行きたいです。`,'想去。'],[`${s.place[0]}へ行きましょう。`,'一起去吧。']]})},
  {name:'想做什麼？',desc:'何をしたいですか',note:'動詞ます形去掉ます＋たいです。します → したいです。',slots:['action'],build:s=>{const a=s.action[0].replace('する','したい').replace('行く','行きたい').replace('入る','入りたい').replace('撮る','撮りたい');const k=s.action[1].replace('する','したい').replace('いく','いきたい').replace('はいる','はいりたい').replace('とる','とりたい');const r=s.action[2].replace('suru','shitai').replace('iku','ikitai').replace('hairu','hairitai').replace('toru','toritai');return {q:['何をしたいですか。','なにをしたいですか。','nani o shitai desu ka.','想做什麼？'],a:[a+'です。',k+'です。',r+' desu.',`想${s.action[3]}。`],tense:[[s.action[0]+'ます。','要做。'],[s.action[0].replace('する','しました').replace('行く','行きました').replace('入る','入りました').replace('撮る','撮りました')+'。','做了。'],[a+'です。','想做。']]}}},
  {name:'想吃什麼？',desc:'何を食べたいですか',note:'食べたいです＝想吃。食べました＝吃了。',slots:['food'],build:s=>({q:['何を食べたいですか。','なにをたべたいですか。','nani o tabetai desu ka.','想吃什麼？'],a:[`${s.food[0]}を食べたいです。`,`${s.food[1]}をたべたいです。`,`${s.food[2]} o tabetai desu.`,`想吃${s.food[3]}。`],tense:[[`${s.food[0]}を食べます。`,'吃。'],[`${s.food[0]}を食べました。`,'吃了。'],[`${s.food[0]}を食べたいです。`,'想吃。']]})},
  {name:'想看什麼？',desc:'何を見たいですか',note:'見る → 見ます → 見たいです；過去式是見ました。',slots:['sight'],build:s=>({q:['何を見たいですか。','なにをみたいですか。','nani o mitai desu ka.','想看什麼？'],a:[`${s.sight[0]}を見たいです。`,`${s.sight[1]}をみたいです。`,`${s.sight[2]} o mitai desu.`,`想看${s.sight[3]}。`],tense:[[`${s.sight[0]}を見ます。`,'看。'],[`${s.sight[0]}を見ました。`,'看了。'],[`${s.sight[0]}を見たいです。`,'想看。']]})},
  {name:'什麼時候去？',desc:'いつ行きますか',note:'時間＋に＋行きます。夏、冬、来週等可不用に；初級練習可先固定用「に」。',slots:['time','place'],build:s=>({q:['いつ行きますか。','いついきますか。','itsu ikimasu ka.','什麼時候去？'],a:[`${s.time[0]}に${s.place[0]}へ行きます。`,`${s.time[1]}に${s.place[1]}へいきます。`,`${s.time[2]} ni ${s.place[2]} e ikimasu.`,`${s.time[3]}去${s.place[3]}。`],tense:[[`${s.time[0]}に行きます。`,'那天去。'],[`${s.time[0]}に行きました。`,'那天去了。'],[`${s.time[0]}に行きたいです。`,'想那天去。']]})},

];
let activePattern=0, slotState={place:0,time:0,action:0,food:0,sight:0,adjPast:0};
function renderPatternPicker(){
  $('patternPicker').innerHTML=patterns.map((p,i)=>`<button class="patternBtn ${i===activePattern?'active':''}" onclick="activePattern=${i};renderPatternPicker();renderDrill();"><div class="patternName">${p.name}</div><div class="patternDesc">${p.desc}</div></button>`).join('');
}
function renderDrill(){
  const p=patterns[activePattern]; $('patternBadge').textContent=p.name;
  $('slotControls').innerHTML=p.slots.map(slot=>`<div class="field"><label>${slot}</label><select onchange="slotState['${slot}']=parseInt(this.value);renderDrill();">${vocab[slot].map((v,i)=>`<option value="${i}" ${i===slotState[slot]?'selected':''}>${v[0]}｜${v[3]}</option>`).join('')}</select></div>`).join('');
  const s={}; p.slots.forEach(slot=>s[slot]=vocab[slot][slotState[slot]]);
  const out=p.build(s); const q=out.q,a=out.a;
  $('qJp').textContent=q[0];$('qKana').textContent=q[1];$('qRomaji').textContent=q[2];$('qZh').textContent=q[3];
  $('aJp').textContent=a[0];$('aKana').textContent=a[1];$('aRomaji').textContent=a[2];$('aZh').textContent=a[3];
  $('grammarNote').textContent=p.note;
  $('tenseTable').innerHTML='<tr><th>日文</th><th>中文用法</th></tr>'+out.tense.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
}
window.speechSynthesis.onvoiceschanged=()=>{};initTabs();loadScenes();renderPatternPicker();renderDrill();
