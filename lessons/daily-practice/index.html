<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>日文疑問詞 × 日常會話跟讀版</title>
<style>
  :root{
    --bg:#f8fafc; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --accent:#2563eb; --accent2:#dbeafe; --good:#16a34a;
    --shadow:0 10px 30px rgba(15,23,42,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#eff6ff 0%,#f8fafc 38%,#fff 100%);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Noto Sans JP",sans-serif;color:var(--ink)}
  .wrap{max-width:1080px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 14px 24px}
  .hero{position:sticky;top:0;z-index:5;background:rgba(248,250,252,.94);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  h1{font-size:22px;margin:0 0 6px;line-height:1.25}
  .sub{color:var(--muted);font-size:13px;line-height:1.5}
  .mainCard{margin-top:12px;border-radius:20px;background:var(--card);border:1px solid var(--line);padding:16px;text-align:center}
  .scene{display:inline-block;font-size:12px;color:#1d4ed8;background:var(--accent2);border-radius:999px;padding:4px 10px;margin-bottom:8px}
  .jp{font-size:clamp(26px,6vw,48px);font-weight:800;line-height:1.22;letter-spacing:.02em}
  .kana{font-size:clamp(18px,4vw,30px);font-weight:650;line-height:1.35;color:#334155;margin-top:8px}
  .romaji{font-size:16px;color:#475569;margin-top:5px;display:none}
  .zh{font-size:clamp(18px,4vw,26px);font-weight:700;color:#0f766e;margin-top:8px}
  .status{font-size:13px;color:var(--muted);margin-top:10px;min-height:20px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
  button,select,input[type=file]{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:15px;font-weight:700;color:var(--ink)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.good{background:var(--good);color:#fff;border-color:var(--good)}
  button:active{transform:scale(.98)}
  .panel{display:grid;grid-template-columns:1fr;gap:10px;margin:12px 0}
  .mini{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}
  .mini h2{font-size:16px;margin:0 0 8px}
  .mini p{margin:4px 0;color:#475569;font-size:13px;line-height:1.55}
  .settings{display:flex;flex-wrap:wrap;gap:10px;align-items:center;font-size:13px;color:#475569}
  .settings label{display:flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 10px}
  .list{display:grid;gap:8px}
  .row{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}
  .row.active{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .no{width:28px;height:28px;border-radius:999px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#334155}
  .row.active .no{background:#2563eb;color:#fff}
  .rjp{font-size:20px;font-weight:800;line-height:1.35}
  .rkana{font-size:15px;color:#475569;margin-top:4px}
  .rromaji{font-size:13px;color:#64748b;margin-top:3px;display:none}
  .rzh{font-size:15px;color:#0f766e;font-weight:700;margin-top:4px}
  .tag{font-size:12px;color:#1d4ed8;background:#dbeafe;border-radius:999px;padding:2px 8px;display:inline-block;margin-top:7px}
  .footer{color:#64748b;font-size:12px;line-height:1.6;margin-top:18px;text-align:center}
  .notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:10px 12px;font-size:13px;line-height:1.6;margin-top:10px}
  @media (min-width:800px){
    .panel{grid-template-columns:1.2fr .8fr}
    .row{grid-template-columns:auto 1fr auto}
  }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 id="title">日文疑問詞 × 日常會話跟讀版</h1>
    <div class="sub">流程：日文 → 平假名確認 → 中文理解 → 日文跟讀 2 次 → 換詞練習</div>

    <div class="mainCard">
      <div class="scene" id="scene">準備中</div>
      <div class="jp" id="jp">按「解鎖／開始」開始</div>
      <div class="kana" id="kana">ブラウザの音声を使います</div>
      <div class="romaji" id="romaji"></div>
      <div class="zh" id="zh">使用手機或瀏覽器內建日文女生語音</div>
      <div class="status" id="status">若 LINE 內建瀏覽器沒有聲音，請改用 Chrome / Safari 開啟。</div>
      <div class="controls">
        <button class="primary" id="startBtn">解鎖／開始</button>
        <button id="pauseBtn">暫停／繼續</button>
        <button id="prevBtn">上一句</button>
        <button id="nextBtn">下一句</button>
        <button id="resetBtn">重置</button>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="mini">
      <h2>語音與播放設定</h2>
      <div class="settings">
        <label>語音
          <select id="voiceSelect"></select>
        </label>
        <label>速度
          <select id="rateSelect">
            <option value="0.78">0.78 慢速</option>
            <option value="0.86" selected>0.86 跟讀</option>
            <option value="0.95">0.95 自然</option>
            <option value="1.05">1.05 快速</option>
          </select>
        </label>
        <label>重複
          <select id="repeatSelect">
            <option value="1">1 次</option>
            <option value="2" selected>2 次</option>
            <option value="3">3 次</option>
          </select>
        </label>
        <label>
          <input type="checkbox" id="romajiToggle"> 顯示羅馬拼音
        </label>
      </div>
      <p>建議：初學者用 0.86 速度、每句重複 2 次。</p>
    </div>

    <div class="mini">
      <h2>替換 JSON</h2>
      <p>把新的 <b>lesson.json</b> 放在同一資料夾即可。也可直接選擇本機 JSON 測試：</p>
      <input type="file" id="fileInput" accept=".json,application/json">
    </div>
  </section>

  <section class="list" id="list"></section>
  <div class="footer">© Japanese Shadowing Trainer｜JSON 可替換版</div>
</div>

<script>
const fallbackLesson = {"title": "日文疑問詞 × 日常會話跟讀版", "voice": {"lang": "ja-JP", "preferredNames": ["Nanami", "Kyoko", "Haruka", "Google 日本語", "Microsoft Nanami", "Microsoft Haruka"], "rate": 0.86, "pitch": 1.08, "volume": 1.0}, "settings": {"repeat": 2, "gapMs": 650, "showRomaji": false}, "items": [{"jp": "これは何ですか。", "kana": "これはなんですか。", "romaji": "Kore wa nan desu ka.", "zh": "這是什麼？", "scene": "購物 / 基礎問句"}, {"jp": "これはいくらですか。", "kana": "これはいくらですか。", "romaji": "Kore wa ikura desu ka.", "zh": "這個多少錢？", "scene": "購物"}, {"jp": "どれがいいですか。", "kana": "どれがいいですか。", "romaji": "Dore ga ii desu ka.", "zh": "哪一個比較好？", "scene": "選擇"}, {"jp": "これをください。", "kana": "これをください。", "romaji": "Kore o kudasai.", "zh": "請給我這個。", "scene": "購物"}, {"jp": "トイレはどこですか。", "kana": "トイレはどこですか。", "romaji": "Toire wa doko desu ka.", "zh": "廁所在哪裡？", "scene": "問路"}, {"jp": "駅までどのくらいかかりますか。", "kana": "えきまでどのくらいかかりますか。", "romaji": "Eki made dono kurai kakarimasu ka.", "zh": "到車站要多久？", "scene": "交通"}, {"jp": "いつ来ますか。", "kana": "いつきますか。", "romaji": "Itsu kimasu ka.", "zh": "什麼時候來？", "scene": "約時間"}, {"jp": "どうしたんですか。", "kana": "どうしたんですか。", "romaji": "Dou shitan desu ka.", "zh": "你怎麼了？", "scene": "關心"}, {"jp": "あの人はだれですか。", "kana": "あのひとはだれですか。", "romaji": "Ano hito wa dare desu ka.", "zh": "那個人是誰？", "scene": "人物"}, {"jp": "どこに行きますか。", "kana": "どこにいきますか。", "romaji": "Doko ni ikimasu ka.", "zh": "要去哪裡？", "scene": "出門"}, {"jp": "だれと行きますか。", "kana": "だれといきますか。", "romaji": "Dare to ikimasu ka.", "zh": "要跟誰去？", "scene": "約朋友"}, {"jp": "いつ行きますか。", "kana": "いついきますか。", "romaji": "Itsu ikimasu ka.", "zh": "什麼時候去？", "scene": "約時間"}, {"jp": "どの店に行きますか。", "kana": "どのみせにいきますか。", "romaji": "Dono mise ni ikimasu ka.", "zh": "要去哪一家店？", "scene": "出門"}, {"jp": "おすすめは何ですか。", "kana": "おすすめはなんですか。", "romaji": "Osusume wa nan desu ka.", "zh": "推薦的是什麼？", "scene": "餐廳"}, {"jp": "どんな食べ物が好きですか。", "kana": "どんなたべものがすきですか。", "romaji": "Donna tabemono ga suki desu ka.", "zh": "你喜歡什麼樣的食物？", "scene": "聊天"}, {"jp": "何を食べますか。", "kana": "なにをたべますか。", "romaji": "Nani o tabemasu ka.", "zh": "要吃什麼？", "scene": "餐廳"}, {"jp": "何を飲みますか。", "kana": "なにをのみますか。", "romaji": "Nani o nomimasu ka.", "zh": "要喝什麼？", "scene": "餐廳"}, {"jp": "これはだれにあげますか。", "kana": "これはだれにあげますか。", "romaji": "Kore wa dare ni agemasu ka.", "zh": "這個要送給誰？", "scene": "送禮"}, {"jp": "なぜこれを選びましたか。", "kana": "なぜこれをえらびましたか。", "romaji": "Naze kore o erabimashita ka.", "zh": "為什麼選這個？", "scene": "理由"}, {"jp": "どんなプレゼントがいいですか。", "kana": "どんなプレゼントがいいですか。", "romaji": "Donna purezento ga ii desu ka.", "zh": "什麼樣的禮物比較好？", "scene": "送禮"}, {"jp": "りんごはいくつありますか。", "kana": "りんごはいくつありますか。", "romaji": "Ringo wa ikutsu arimasu ka.", "zh": "蘋果有幾個？", "scene": "數量"}, {"jp": "今どこにいますか。", "kana": "いまどこにいますか。", "romaji": "Ima doko ni imasu ka.", "zh": "你現在在哪裡？", "scene": "聯絡"}, {"jp": "会議はいつですか。", "kana": "かいぎはいつですか。", "romaji": "Kaigi wa itsu desu ka.", "zh": "會議是什麼時候？", "scene": "工作"}, {"jp": "日本料理で何が好きですか。", "kana": "にほんりょうりでなにがすきですか。", "romaji": "Nihon ryouri de nani ga suki desu ka.", "zh": "日本料理裡你喜歡什麼？", "scene": "聊天"}]};

let lesson = fallbackLesson;
let items = lesson.items || [];
let idx = 0;
let playing = false;
let paused = false;
let currentUtterance = null;
let playToken = 0;
let voices = [];
let selectedVoice = null;

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function loadLesson(){
  try{
    const res = await fetch('lesson.json?v=' + Date.now(), {cache:'no-store'});
    if(res.ok){
      lesson = await res.json();
      items = lesson.items || [];
      $('status').textContent = '已載入 lesson.json，共 ' + items.length + ' 句。';
    }else{
      $('status').textContent = '未找到 lesson.json，使用 HTML 內建資料。';
    }
  }catch(e){
    $('status').textContent = '使用 HTML 內建資料。上傳 GitHub Pages 後，請把 lesson.json 放同一資料夾。';
  }
  $('title').textContent = lesson.title || '日文跟讀版';
  if(lesson.settings){
    if(lesson.settings.repeat) $('repeatSelect').value = String(lesson.settings.repeat);
    if(lesson.settings.showRomaji) $('romajiToggle').checked = true;
  }
  if(lesson.voice && lesson.voice.rate) $('rateSelect').value = String(lesson.voice.rate);
  renderList();
  showItem(0);
  applyRomaji();
}

function loadVoices(){
  voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  const sel = $('voiceSelect');
  sel.innerHTML = '';

  const keepNames = ['Sayaka', 'Haruka', 'Ayumi', 'Ichiro'];
  const jaVoices = voices.filter(v => (v.lang || '').toLowerCase().startsWith('ja'));

  let pool = keepNames
    .map(name => jaVoices.find(v => v.name.toLowerCase().includes(name.toLowerCase())))
    .filter(Boolean);

  if(!pool.length){
    pool = jaVoices.length ? jaVoices.slice(0, 4) : voices.slice(0, 4);
  }

  pool.forEach((v) => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });

  selectedVoice = pool.find(v => v.name.toLowerCase().includes('sayaka'))
               || pool.find(v => v.name.toLowerCase().includes('haruka'))
               || pool[0]
               || null;

  if(selectedVoice) sel.value = selectedVoice.name;
}

function getVoice(){
  const name = $('voiceSelect').value;
  return voices.find(v => v.name === name) || selectedVoice;
}

function speak(text, token){
  return new Promise(resolve => {
    if(!window.speechSynthesis){
      $('status').textContent = '此瀏覽器不支援語音朗讀。';
      resolve();
      return;
    }
    if(token !== playToken){
      resolve();
      return;
    }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = (lesson.voice && lesson.voice.lang) || 'ja-JP';
    u.rate = parseFloat($('rateSelect').value || '0.86');
    u.pitch = (lesson.voice && lesson.voice.pitch) || 1.08;
    u.volume = (lesson.voice && lesson.voice.volume) || 1.0;
    const v = getVoice();
    if(v) u.voice = v;
    currentUtterance = u;
    u.onend = () => resolve();
    u.onerror = () => resolve();
    speechSynthesis.speak(u);
  });
}

function renderList(){
  const list = $('list');
  list.innerHTML = '';
  items.forEach((it, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'row' + i;
    row.innerHTML = `
      <div class="no">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="rjp">${escapeHtml(it.jp || '')}</div>
        <div class="rkana">${escapeHtml(it.kana || '')}</div>
        <div class="rromaji">${escapeHtml(it.romaji || '')}</div>
        <div class="rzh">${escapeHtml(it.zh || '')}</div>
        <div class="tag">${escapeHtml(it.scene || '跟讀')}</div>
      </div>
      <button data-i="${i}">播放</button>
    `;
    row.addEventListener('click', e => {
      const n = Number(row.querySelector('button').dataset.i);
      jumpTo(n);
    });
    list.appendChild(row);
  });
  applyRomaji();
}

function showItem(i){
  if(!items.length) return;
  idx = Math.max(0, Math.min(i, items.length - 1));
  const it = items[idx];
  $('scene').textContent = it.scene || `第 ${idx+1} 句`;
  $('jp').textContent = it.jp || '';
  $('kana').textContent = it.kana || '';
  $('romaji').textContent = it.romaji || '';
  $('zh').textContent = it.zh || '';
  document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
  const row = $('row' + idx);
  if(row){
    row.classList.add('active');
    row.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

async function playFrom(startIndex=0, onlyOne=false){
  if(!items.length) return;
  const myToken = ++playToken;
  speechSynthesis.cancel();
  playing = true;
  paused = false;
  idx = startIndex;
  $('startBtn').textContent = '播放中';
  const repeat = parseInt($('repeatSelect').value || '2', 10);
  const gap = (lesson.settings && lesson.settings.gapMs) || 650;
  const endIndex = onlyOne ? Math.min(startIndex + 1, items.length) : items.length;

  while(playing && myToken === playToken && idx < endIndex){
    showItem(idx);
    const it = items[idx];
    for(let r=1; r<=repeat; r++){
      if(!playing || myToken !== playToken) break;
      while(paused && playing && myToken === playToken) await sleep(120);
      if(!playing || myToken !== playToken) break;
      $('status').textContent = `第 ${idx+1}/${items.length} 句｜跟讀 ${r}/${repeat}`;
      await speak(it.jp || '', myToken);
      if(!playing || myToken !== playToken) break;
      await sleep(gap);
    }
    idx++;
  }

  if(myToken !== playToken) return;

  playing = false;
  paused = false;
  $('startBtn').textContent = '解鎖／開始';
  if(onlyOne){
    idx = Math.max(0, Math.min(startIndex, items.length - 1));
    showItem(idx);
    $('status').textContent = `第 ${startIndex+1} 句單句播放完成。`;
  }else{
    idx = Math.max(0, Math.min(idx, items.length - 1));
    $('status').textContent = '完成一輪。按「解鎖／開始」可再練一次。';
  }
}

function stopCurrentSpeech(){
  playToken++;
  playing = false;
  paused = false;
  if(window.speechSynthesis){
    speechSynthesis.cancel();
    speechSynthesis.resume();
  }
  $('startBtn').textContent = '解鎖／開始';
}

function jumpTo(i){
  stopCurrentSpeech();
  showItem(i);
  setTimeout(() => playFrom(i, true), 160);
}

function applyRomaji(){
  const on = $('romajiToggle').checked;
  document.querySelectorAll('.romaji,.rromaji').forEach(el => el.style.display = on ? 'block' : 'none');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

$('startBtn').addEventListener('click', async () => {
  if(playing){
    stopCurrentSpeech();
    $('status').textContent = '已停止播放。';
    return;
  }
  await playFrom(idx || 0, false);
});

$('pauseBtn').addEventListener('click', () => {
  if(!window.speechSynthesis) return;
  if(!paused){
    paused = true;
    speechSynthesis.pause();
    $('status').textContent = '已暫停。';
  }else{
    paused = false;
    speechSynthesis.resume();
    $('status').textContent = '繼續播放。';
  }
});

$('prevBtn').addEventListener('click', () => {
  stopCurrentSpeech(); showItem(Math.max(0, idx - 1));
});
$('nextBtn').addEventListener('click', () => {
  stopCurrentSpeech(); showItem(Math.min(items.length - 1, idx + 1));
});
$('resetBtn').addEventListener('click', () => {
  stopCurrentSpeech(); showItem(0); $('status').textContent = '已重置到第一句。';
});
$('romajiToggle').addEventListener('change', applyRomaji);
$('voiceSelect').addEventListener('change', () => { selectedVoice = getVoice(); });

$('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if(!file) return;
  const text = await file.text();
  lesson = JSON.parse(text);
  items = lesson.items || [];
  $('title').textContent = lesson.title || '日文跟讀版';
  renderList();
  showItem(0);
  $('status').textContent = '已載入本機 JSON，共 ' + items.length + ' 句。';
});

if(window.speechSynthesis){
  speechSynthesis.onvoiceschanged = () => { loadVoices(); };
}

(async function init(){
  await loadLesson();
  loadVoices();
})();
</script>
</body>
</html>
