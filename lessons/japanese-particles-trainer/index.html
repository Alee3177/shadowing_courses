<body><div class="wrap">
<section class="hero"><h1 class="title">N5助詞訓練器</h1><div class="sub">① 先認識15個助詞　→　② 集中練 を・で・に 句子　→　③ 練人稱＋助詞組合變化</div><div class="voiceBar"><label for="voiceSelect">日文朗讀聲音：</label><select id="voiceSelect"><option value="Ichiro" selected>Microsoft Ichiro - Japanese (Japan) 男聲</option><option value="Ayumi">Microsoft Ayumi - Japanese (Japan) 女聲</option><option value="Haruka">Microsoft Haruka - Japanese (Japan) 女聲</option><option value="Sayaka">Microsoft Sayaka - Japanese (Japan) 女聲</option></select><button class="btn" id="testVoiceBtn" type="button">🔊 試聽</button></div></section>

function loadVoices(){voices=('speechSynthesis'in window)?speechSynthesis.getVoices():[];updateVoiceAvailability()}
function updateVoiceAvailability(){const sel=document.getElementById('voiceSelect');if(!sel||!voices.length)return;[...sel.options].forEach(opt=>{const found=voices.some(v=>v.lang&&v.lang.startsWith('ja')&&new RegExp(opt.value,'i').test(v.name));opt.textContent=opt.textContent.replace(/（未安裝）/g,'')+(found?'':'（未安裝）')})}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices}
function getVoice(){loadVoices();const sel=document.getElementById('voiceSelect');const wanted=(sel&&sel.value)||'Ichiro';return voices.find(v=>v.lang&&v.lang.startsWith('ja')&&new RegExp(wanted,'i').test(v.name))||voices.find(v=>v.lang&&v.lang.startsWith('ja')&&/ichiro/i.test(v.name))||voices.find(v=>v.lang==='ja-JP')||voices.find(v=>v.lang&&v.lang.startsWith('ja'))||null}
function speak(text,rate=.9){if(!('speechSynthesis'in window)){alert('此裝置不支援語音朗讀');return} speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(text||'').replace(/\s+/g,'、'));u.lang='ja-JP';u.rate=rate;u.pitch=1;u.volume=1;const v=getVoice();if(v)u.voice=v;speechSynthesis.speak(u)}
function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function markToken(text, token, romaji=false){text=esc(text); if(!token)return text; const t=esc(token); if(romaji){return text.replace(new RegExp('(^|\\s)('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?=\\s|[.,。]|$)','i'), '$1<span class="mark">$2</span>')} return text.replace(t, '<span class="mark">'+t+'</span>')}
function markLine(obj,p){return markToken(obj.jp||obj.pattern,p.particle)+'<br><span class="mini">'+markToken(obj.kana||obj.patternKana,p.kana)+' / '+markToken(obj.romaji||obj.patternRomaji,p.romaji,true)+'</span>'}
function markParticleParts(jp,kana,romaji,particle){const pj=(particle==='のもの')?'の':particle;const pk=(particle==='のもの')?'の':particle;const pr=(particle==='は')?'wa':(particle==='を')?'o':(particle==='へ')?'e':(particle==='のもの')?'no':particle;return{jp:markToken(jp,pj),kana:markToken(kana,pk),romaji:markToken(romaji,pr,true)}}
function markMultiParticles(jp,kana,romaji,parts){let a=esc(jp),b=esc(kana),c=esc(romaji);for(const part of parts){const ro=(part==='は')?'wa':(part==='を')?'o':(part==='へ')?'e':part;const er=ro.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');a=a.replace(esc(part),'<span class="mark">'+esc(part)+'</span>');b=b.replace(esc(part),'<span class="mark">'+esc(part)+'</span>');c=c.replace(new RegExp('(^|\\s)('+er+')(?=\\s|[.,。]|$)','i'),'$1<span class="mark">$2</span>')}return{jp:a,kana:b,romaji:c}}

byId('speakP').onclick=()=>{const e=currentP().examples[0];speak(e.kana)};byId('nextP').onclick=()=>{pIndex=(pIndex+1)%P15.particles.length;renderParticle()};
function newQuiz(){currentQuiz=P15.quiz[Math.floor(Math.random()*P15.quiz.length)];byId('quizPrompt').textContent=currentQuiz.prompt;byId('quizBlank').textContent=currentQuiz.blank;byId('quizOptions').innerHTML=currentQuiz.options.map(o=>`<button class="option" onclick="answerQuiz('${o}')">${esc(o)}</button>`).join('');byId('quizFeedback').className='feedback';byId('quizFeedback').innerHTML=''}
function answerQuiz(o){qStats.t++;let ok=o===currentQuiz.answer;if(ok)qStats.c++;else qStats.w++;const p=P15.particles.find(x=>x.particle===currentQuiz.answer)||{particle:currentQuiz.answer,kana:currentQuiz.answer,romaji:''};byId('quizFeedback').className='feedback '+(ok?'ok':'bad');byId('quizFeedback').innerHTML=`${ok?'答對！':'答錯。'} 正解：<span class="mark">${esc(currentQuiz.answer)}</span><br>${markToken(currentQuiz.jp,p.particle)}<br><span class="mini">${markToken(currentQuiz.kana,p.kana)} / ${markToken(currentQuiz.romaji,p.romaji,true)}</span><br><button class="btn blue" onclick="speak('${esc(currentQuiz.kana)}')">🔊 朗讀</button>`;updateQStats()}
function updateQStats(){byId('qTotal').textContent='總題數：'+qStats.t;byId('qCorrect').textContent='答對：'+qStats.c;byId('qWrong').textContent='答錯：'+qStats.w;byId('qRate').textContent='正確率：'+(qStats.t?Math.round(qStats.c/qStats.t*100):0)+'%'}
byId('newQuiz').onclick=newQuiz;byId('resetQuiz').onclick=()=>{qStats={t:0,c:0,w:0};updateQStats();newQuiz()};
// Tab 2
let si=0, shadowRun=false;
function shadowFiltered(){const f=byId('shadowFilter').value;return f==='all'?SHADOW:SHADOW.filter(x=>x.particle===f)}
function currentS(){const arr=shadowFiltered();if(si>=arr.length)si=0;return arr[si]}
function tagClass(p){return p==='を'?'wo':p==='で'?'de':'ni'}
function markedShadow(d){return markParticleParts(d.text,d.kana,d.romaji,d.particle)}
function renderShadowList(){const arr=shadowFiltered();byId('shadowList').innerHTML=arr.map((d,k)=>{const m=markedShadow(d);return `<div class="row ${k===si?'active':''}" onclick="si=${k};renderShadow()"><div class="no">${String(k+1).padStart(2,'0')}</div><div><div class="rjp">${m.jp}<span class="tag ${tagClass(d.particle)}">${d.particle}</span></div><div class="rkana">${m.kana} / ${m.romaji}</div><div class="mini">${esc(d.zh)}</div></div><button class="btn" onclick="event.stopPropagation();si=${k};renderShadow();speakShadowOne()">▶</button></div>`}).join('')}
function renderShadow(){const arr=shadowFiltered(),d=currentS(),m=markedShadow(d);byId('shadowIdx').textContent=`第 ${si+1} / ${arr.length} 句 ｜ 助詞：${d.particle}`;byId('shadowJp').innerHTML=m.jp;byId('shadowKana').innerHTML=m.kana+' / '+m.romaji;byId('shadowZh').textContent=d.zh;renderShadowList()}
function speakShadowOne(){speak(currentS().kana,parseFloat(byId('shadowRate').value))}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
async function startShadow(){shadowRun=true;const repeat=+byId('shadowRepeat').value,gap=+byId('shadowGap').value;while(shadowRun){const arr=shadowFiltered();for(;si<arr.length&&shadowRun;si++){renderShadow();for(let r=0;r<repeat&&shadowRun;r++){speakShadowOne();await wait(1800+gap)}}si=0;if(!shadowRun)break;await wait(1000)}}
byId('speakShadow').onclick=speakShadowOne;byId('startShadow').onclick=startShadow;byId('stopShadow').onclick=()=>{shadowRun=false;speechSynthesis.cancel()};byId('prevShadow').onclick=()=>{si=(si-1+shadowFiltered().length)%shadowFiltered().length;renderShadow()};byId('nextShadow').onclick=()=>{si=(si+1)%shadowFiltered().length;renderShadow()};byId('shadowFilter').onchange=()=>{si=0;renderShadow()};
// Tab 3
const pronouns=[{key:'watashi',jp:'わたし',kana:'わたし',romaji:'watashi',zh:'我'},{key:'anata',jp:'あなた',kana:'あなた',romaji:'anata',zh:'你'},{key:'kare',jp:'かれ',kana:'かれ',romaji:'kare',zh:'他'},{key:'kanojo',jp:'かのじょ',kana:'かのじょ',romaji:'kanojo',zh:'她'},{key:'watashitachi',jp:'わたしたち',kana:'わたしたち',romaji:'watashitachi',zh:'我們'},{key:'anatatachi',jp:'あなたたち',kana:'あなたたち',romaji:'anatatachi',zh:'你們'},{key:'karera',jp:'かれら',kana:'かれら',romaji:'karera',zh:'他們'},{key:'kanojotachi',jp:'かのじょたち',kana:'かのじょたち',romaji:'kanojotachi',zh:'她們'}];
const prParticles=[{key:'wa',jp:'は',kana:'は',romaji:'wa',zh:'主題',map:{watashi:'我 / I',anata:'你 / You',kare:'他 / He',kanojo:'她 / She',watashitachi:'我們 / We',anatatachi:'你們 / You plural',karera:'他們 / They',kanojotachi:'她們 / They'}},{key:'no',jp:'の',kana:'の',romaji:'no',zh:'所有',map:{watashi:'我的 / my',anata:'你的 / your',kare:'他的 / his',kanojo:'她的 / her',watashitachi:'我們的 / our',anatatachi:'你們的 / your plural',karera:'他們的 / their',kanojotachi:'她們的 / their'}},{key:'ni',jp:'に',kana:'に',romaji:'ni',zh:'對象',map:{watashi:'給我 / to me',anata:'給你 / to you',kare:'給他 / to him',kanojo:'給她 / to her',watashitachi:'給我們 / to us',anatatachi:'給你們 / to you plural',karera:'給他們 / to them',kanojotachi:'給她們 / to them'}},{key:'nomono',jp:'のもの',kana:'の もの',romaji:'no mono',zh:'所有物',map:{watashi:'我的東西 / mine',anata:'你的東西 / yours',kare:'他的東西 / his',kanojo:'她的東西 / hers',watashitachi:'我們的東西 / ours',anatatachi:'你們的東西 / yours plural',karera:'他們的東西 / theirs',kanojotachi:'她們的東西 / theirs'}}];
let pri=0, pti=0;
function buildPr(){const p=pronouns[pri],t=prParticles[pti];return{jp:p.jp+t.jp,kana:p.kana+' '+t.kana,romaji:p.romaji+' '+t.romaji,zh:t.map[p.key],particle:t.jp}}
function markedPr(r){return markParticleParts(r.jp,r.kana,r.romaji,r.particle)}
function renderPr(){const r=buildPr(),m=markedPr(r);byId('pronounList').innerHTML='<div class="mini">人稱代名詞</div>'+pronouns.map((p,i)=>`<div class="pill ${i===pri?'active':''}" onclick="pri=${i};renderPr()">${p.jp}｜${p.romaji}｜${p.zh}</div>`).join('');byId('particleList').innerHTML='<div class="mini">助詞 / 所有物</div>'+prParticles.map((p,i)=>{const mm=markParticleParts(p.jp,p.kana,p.romaji,p.jp);return `<div class="pill ${i===pti?'active':''}" onclick="pti=${i};renderPr()">${mm.jp}｜${mm.romaji}｜${p.zh}</div>`}).join('');byId('prJp').innerHTML=m.jp;byId('prKana').innerHTML=m.kana+' / '+m.romaji;byId('prZh').textContent=r.zh}
function renderPrTable(){byId('pronounTable').innerHTML=pronouns.flatMap(p=>prParticles.map(t=>{const r={jp:p.jp+t.jp,kana:p.kana+' '+t.kana,romaji:p.romaji+' '+t.romaji,particle:t.jp};const m=markedPr(r);return `<tr><td>${m.jp}</td><td>${m.kana} / ${m.romaji}</td><td>${t.map[p.key]}</td></tr>`})).join('')}
byId('spinPronoun').onclick=()=>{pri=Math.floor(Math.random()*pronouns.length);renderPr()};byId('spinParticle').onclick=()=>{pti=Math.floor(Math.random()*prParticles.length);renderPr()};byId('spinBoth').onclick=()=>{pri=Math.floor(Math.random()*pronouns.length);pti=Math.floor(Math.random()*prParticles.length);renderPr()};byId('speakPronoun').onclick=()=>speak(buildPr().kana);
document.querySelectorAll('.modeBtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.modeBtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');byId('pmLearning').style.display=b.dataset.pmode==='learning'?'':'none';byId('pmQuiz').style.display=b.dataset.pmode==='pquiz'?'':'none';byId('pmSentence').style.display=b.dataset.pmode==='sentence'?'':'none'});
function newPQuiz(){const p=pronouns[Math.floor(Math.random()*pronouns.length)],t=prParticles[Math.floor(Math.random()*prParticles.length)],ans=p.jp+t.jp;byId('pQuizPrompt').textContent=t.map[p.key]+' = ?';const pool=pronouns.flatMap(pp=>prParticles.map(tt=>pp.jp+tt.jp)).filter(x=>x!==ans).sort(()=>Math.random()-.5).slice(0,3).concat(ans).sort(()=>Math.random()-.5);byId('pQuizOptions').innerHTML=pool.map(o=>{const particle=o.includes('のもの')?'のもの':(o.endsWith('は')?'は':o.endsWith('の')?'の':o.endsWith('に')?'に':'');const m=particle?markParticleParts(o,o,particle==='のもの'?'no mono':particle,particle).jp:esc(o);return `<button class="option" onclick="showPQuizAnswer('${esc(o)}','${esc(ans)}','${esc(t.jp)}')">${m}</button>`}).join('')}
function showPQuizAnswer(o,ans,particle){const ok=o===ans;const m=markParticleParts(ans,ans,particle==='のもの'?'no mono':particle,particle);byId('pQuizFeedback').className='feedback '+(ok?'ok':'bad');byId('pQuizFeedback').innerHTML=(ok?'答對':'答錯')+'，正解：'+m.jp}
byId('newPQuiz').onclick=newPQuiz;
const sentenceTemplates=[
 p=>({jp:`${p.jp}は がいこくじんです。`,kana:`${p.kana} は がいこくじん です。`,romaji:`${p.romaji} wa gaikokujin desu.`,zh:`${p.zh}是外國人。`,parts:['は']}),
 p=>({jp:`${p.jp}の なまえです。`,kana:`${p.kana} の なまえ です。`,romaji:`${p.romaji} no namae desu.`,zh:`${p.zh}的名字。`,parts:['の']}),
 p=>({jp:`${p.jp}に あげます。`,kana:`${p.kana} に あげます。`,romaji:`${p.romaji} ni agemasu.`,zh:`給${p.zh}。`,parts:['に']}),
 p=>({jp:`これは ${p.jp}のものです。`,kana:`これ は ${p.kana} の もの です。`,romaji:`kore wa ${p.romaji} no mono desu.`,zh:`這是${p.zh}的東西。`,parts:['は','の']})
];
let curSent=null;
function newSent(){curSent=sentenceTemplates[Math.floor(Math.random()*sentenceTemplates.length)](pronouns[Math.floor(Math.random()*pronouns.length)]);const m=markMultiParticles(curSent.jp,curSent.kana,curSent.romaji,curSent.parts);byId('sentJp').innerHTML=m.jp;byId('sentKana').innerHTML=m.kana+' / '+m.romaji;byId('sentZh').textContent=curSent.zh}
byId('newSentence').onclick=newSent;byId('speakSentence').onclick=()=>curSent&&speak(curSent.kana);
renderParticle();newQuiz();renderShadow();renderPr();renderPrTable();newPQuiz();newSent();

const testVoiceBtn=document.getElementById('testVoiceBtn');if(testVoiceBtn){testVoiceBtn.onclick=()=>speak('こんにちは。わたしは日本語を勉強しています。',.9)}
const voiceSelect=document.getElementById('voiceSelect');if(voiceSelect){voiceSelect.onchange=()=>speak('この声で読みます。',.9)}

</script></body></html>
