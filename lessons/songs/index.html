<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowing Player｜自動對齊版</title>
<style>
:root{--bg:#0f172a;--panel:#1e293b;--panel2:#020617;--line:#334155;--text:#e2e8f0;--muted:#94a3b8;--blue:#38bdf8;--yellow:#facc15;--pink:#fb7185;--green:#86efac;--red:#fca5a5}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);margin:0;padding:18px}
.container{max-width:960px;margin:auto}
h1{text-align:center;margin:8px 0 14px;font-size:24px}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;margin:14px 0}
button,select{padding:10px 14px;border:none;border-radius:10px;font-weight:700;background:var(--blue);color:#00111a;cursor:pointer}
select{background:#e2e8f0;color:#0f172a}
button.secondary{background:#cbd5e1}
button.danger{background:#f87171}
.status{text-align:center;color:var(--muted);font-size:14px;margin:8px 0 12px}
.main-card{background:var(--panel);padding:22px;border-radius:16px;text-align:center;margin-bottom:14px;border:2px solid transparent;transition:.15s;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.main-card.listen{border-color:var(--blue)}
.main-card.prepare{border-color:var(--yellow)}
.main-card.speak{border-color:var(--pink);box-shadow:0 0 20px rgba(251,113,133,.35)}
.hint{font-size:18px;font-weight:800;margin-bottom:12px;color:var(--yellow)}
.jp{font-size:28px;line-height:1.35;margin-bottom:10px;font-weight:800}
.kana{color:#93c5fd;font-size:18px;margin-bottom:5px}
.romaji{color:var(--red);font-size:16px;margin-bottom:5px}
.zh{color:var(--green);font-size:18px}
.progress-wrap{height:11px;background:var(--line);border-radius:99px;overflow:hidden;margin:18px 0 4px}
.progress-bar{height:100%;width:0%;background:var(--blue);transition:width .06s linear}
.list{max-height:430px;overflow:auto;background:var(--panel2);padding:10px;border-radius:14px;scroll-behavior:smooth}
.row{padding:11px 12px;border-bottom:1px solid #1e293b;border-radius:10px}
.row.active{background:#334155;outline:2px solid var(--blue)}
.row .small{font-size:13px;color:var(--muted);line-height:1.45}
.row .zhsmall{font-size:13px;color:#86efac;line-height:1.45}
@media(max-width:640px){body{padding:12px}.jp{font-size:23px}.kana{font-size:16px}.controls{gap:8px}button,select{padding:9px 10px}}
</style>
</head>
<body>
<div class="container">
<h1>🎧 Shadowing Player</h1>
<div class="controls">
  <button onclick="unlockAudio()">🔓 解鎖音訊</button>
  <button onclick="start()">▶️ 開始</button>
  <button class="secondary" onclick="pauseToggle()">⏸️ 暫停 / 繼續</button>
  <button class="danger" onclick="stopAll()">⏹️ 停止</button>
  <select id="repeat"><option value="1">每句 1 次</option><option value="2" selected>每句 2 次</option><option value="3">每句 3 次</option></select>
  <select id="delay"><option value="500">跟讀延遲 0.5 秒</option><option value="800" selected>跟讀延遲 0.8 秒</option><option value="1200">跟讀延遲 1.2 秒</option><option value="1500">跟讀延遲 1.5 秒</option></select>
  <select id="rate" onchange="audio.playbackRate=parseFloat(this.value)"><option value="0.75">速度 0.75x</option><option value="0.85">速度 0.85x</option><option value="1" selected>速度 1.00x</option><option value="1.1">速度 1.10x</option></select>
</div>
<div class="status" id="status">請先解鎖音訊，再按開始。時間軸已內建前奏校正。</div>
<div class="main-card" id="card">
  <div class="hint" id="hint">請先解鎖音訊</div>
  <div class="jp" id="jp">準備開始</div>
  <div class="kana" id="kana"></div>
  <div class="romaji" id="romaji"></div>
  <div class="zh" id="zh"></div>
  <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
</div>
<div class="list" id="list"></div>
</div>
<script>
const AUDIO_FILE="input.mp3";
const JSON_FILE="song.json";
let audio=new Audio(AUDIO_FILE);
let data=[],current=0,repeatNow=1,timer=null,playing=false,paused=false,speakTimer=null;

async function load(){
  try{
    const res=await fetch(JSON_FILE+"?v="+Date.now());
    if(!res.ok) throw new Error("JSON load failed");
    data=await res.json();
    renderList();
    status.innerText="已載入 "+data.length+" 句。";
  }catch(e){
    status.innerText="song.json 載入失敗，請確認 index.html / input.mp3 / song.json 在同一層。";
  }
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function renderList(){
  list.innerHTML=data.map((d,i)=>`
    <div class="row ${i===current?'active':''}" id="row-${i}">
      <b>${String(i+1).padStart(2,"0")}. ${escapeHtml(d.text||"")}</b>
      <div class="small">${escapeHtml(d.kana||"")}</div>
      <div class="small">${escapeHtml(d.romaji||"")}</div>
      <div class="zhsmall">${escapeHtml(d.zh||"")}</div>
    </div>`).join("");
  const active=document.getElementById("row-"+current);
  if(active) active.scrollIntoView({behavior:"smooth",block:"center"});
}
function show(i){
  const d=data[i];
  jp.innerText=d.text||""; kana.innerText=d.kana||""; romaji.innerText=d.romaji||""; zh.innerText=d.zh||"";
  renderList();
}
function setPhase(phase,text){card.className="main-card "+(phase||""); hint.innerText=text}
function updateProgress(seg){
  const total=Math.max(seg.end-seg.start,0.01), now=audio.currentTime-seg.start;
  bar.style.width=Math.max(0,Math.min(100,(now/total)*100))+"%";
}
function sleep(ms){return new Promise(resolve=>{clearTimeout(speakTimer);speakTimer=setTimeout(resolve,ms)})}
async function start(){
  if(!data.length) return;
  stopAll(false); current=0; repeatNow=1; playing=true; paused=false;
  await playCurrent();
}
async function playCurrent(){
  if(!playing) return;
  if(current>=data.length){
    setPhase("","完成"); status.innerText="已完成，3秒後回到第一句。"; bar.style.width="100%";
    setTimeout(()=>{current=0;renderList()},3000); return;
  }
  const seg=data[current];
  const repeatTotal=parseInt(repeat.value,10), followDelay=parseInt(delay.value,10);
  show(current);
  setPhase("listen",`🎧 先聽原音：第 ${current+1} 句 / 第 ${repeatNow} 次`);
  status.innerText=`播放時間：${seg.start.toFixed(1)}s → ${seg.end.toFixed(1)}s`;
  audio.pause(); audio.currentTime=Math.max(0,seg.start); audio.playbackRate=parseFloat(rate.value);
  await audio.play().catch(()=>{setPhase("","請先按「解鎖音訊」")});
  clearInterval(timer);
  timer=setInterval(()=>{
    if(!paused) updateProgress(seg);
    if(audio.currentTime>=seg.end){
      audio.pause(); clearInterval(timer); bar.style.width="100%";
      afterListen(repeatTotal,followDelay);
    }
  },60);
}
async function afterListen(repeatTotal,followDelay){
  if(!playing) return;
  setPhase("prepare",`⏱ 準備跟讀：${(followDelay/1000).toFixed(1)} 秒`);
  await sleep(followDelay);
  if(!playing) return;
  setPhase("speak","🗣️ 請開口跟讀");
  await sleep(Math.max(1200,followDelay));
  if(!playing) return;
  if(repeatNow<repeatTotal){repeatNow++;bar.style.width="0%";await playCurrent()}
  else{current++;repeatNow=1;bar.style.width="0%";await playCurrent()}
}
function pauseToggle(){
  if(!playing) return;
  if(audio.paused){paused=false;audio.play().catch(()=>{});setPhase("listen","▶️ 繼續播放")}
  else{paused=true;audio.pause();setPhase("prepare","⏸️ 已暫停")}
}
function stopAll(reset=true){
  playing=false; paused=false; audio.pause(); clearInterval(timer); clearTimeout(speakTimer); bar.style.width="0%";
  if(reset){current=0;repeatNow=1;setPhase("","已停止");status.innerText="已停止。";renderList()}
}
function unlockAudio(){
  audio.play().then(()=>{audio.pause();audio.currentTime=0;setPhase("","音訊已解鎖，可以開始");status.innerText="音訊已解鎖，可以按開始。"})
  .catch(()=>alert("音訊解鎖失敗，請再點一次"));
}
load();
</script>
</body>
</html>
