<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowing Player</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:10px 0}

button,select,input{
  padding:8px;
  border-radius:8px;
  border:none;
}

.main-card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.progress{
  height:10px;
  background:#334155;
  margin-top:10px;
  border-radius:999px;
  overflow:hidden;
}
.bar{
  height:100%;
  width:0%;
  background:#38bdf8;
}
</style>
</head>

<body>
<div class="container">

<h2>🎧 Shadowing（Offset校正版）</h2>

<div class="controls">
  <button onclick="unlock()">🔓解鎖</button>
  <button onclick="start()">▶開始</button>
  <button onclick="pause()">⏸暫停</button>

  <label>Offset：
    <input type="range" min="-20" max="20" step="0.1" value="0" id="offset">
  </label>
  <span id="offsetVal">0.0s</span>
</div>

<div class="main-card">
  <div id="jp">準備</div>
  <div id="kana"></div>
  <div id="romaji"></div>
  <div id="zh"></div>

  <div class="progress"><div class="bar" id="bar"></div></div>
</div>

</div>

<script>
let audio = new Audio("input.mp3");
let data = [];
let i = 0;
let timer;

const offsetEl = document.getElementById("offset");
const offsetVal = document.getElementById("offsetVal");

offsetEl.oninput = () => {
  offsetVal.innerText = offsetEl.value + "s";
};

async function load(){
  const res = await fetch("song.json?v="+Date.now());
  data = await res.json();
}

function show(d){
  jp.innerText = d.text;
  kana.innerText = d.kana;
  romaji.innerText = d.romaji;
  zh.innerText = d.zh;
}

function start(){
  i = 0;
  play();
}

function play(){
  if(i >= data.length) return;

  let d = data[i];
  let offset = parseFloat(offsetEl.value);

  let start = d.start + offset;
  let end = d.end + offset;

  audio.currentTime = start;
  audio.play();

  show(d);

  clearInterval(timer);
  timer = setInterval(()=>{
    let p = (audio.currentTime - start)/(end-start)*100;
    bar.style.width = Math.max(0, Math.min(100, p)) + "%";

    if(audio.currentTime >= end){
      i++;
      play();
    }
  },80);
}

function pause(){
  audio.pause();
}

function unlock(){
  audio.play().then(()=>{
    audio.pause();
    audio.currentTime = 0;
    alert("已解鎖");
  }).catch(()=>alert("再點一次"));
}

load();
</script>

</body>
</html>
