<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>日文語法(STPPOV)含助詞替換句型練習</title>
<style>
:root{
  --line:#e5e7eb;--ink:#111827;--muted:#6b7280;--card:#fff;--shadow:0 8px 24px rgba(15,23,42,.10);
  --s:#f59e0b;--t:#38bdf8;--p1:#22c55e;--p2:#a855f7;--o:#ef4444;--v:#2563eb;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC","Noto Sans JP",sans-serif;background:linear-gradient(180deg,#f8fafc,#eef2ff);color:var(--ink)}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px}
h1{font-size:20px;margin:0 0 6px;font-weight:950}
.pattern{font-size:14px;color:var(--muted);line-height:1.5}
main{max-width:1180px;margin:0 auto;padding:16px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 16px}
button,select{border:0;border-radius:999px;padding:10px 14px;font-weight:850;background:#fff;box-shadow:var(--shadow);font-size:15px;color:var(--ink)}
button{cursor:pointer}
.primary{background:#111827;color:white}
.light{background:#e8f1ff;color:#173b7a}
.warn{background:#fff7ed;color:#9a3412}
.layout{display:grid;grid-template-columns:1fr 390px;gap:16px}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:16px}
.formula{background:#111827;color:white;border-radius:16px;padding:12px 14px;font-weight:950;line-height:1.65;margin-bottom:12px;text-align:center}
.red{color:#fca5a5;font-weight:950}
.blocks{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0}
@media(max-width:720px){.blocks{grid-template-columns:repeat(2,1fr)}}
.block{border-radius:16px;padding:10px 8px;color:white;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.35);min-height:104px;display:flex;flex-direction:column;justify-content:center}
.label{font-size:13px;font-weight:950}
.bjp{font-size:23px;font-weight:950}
.bkana,.bzh{font-size:13px;font-weight:850}
.s{background:var(--s)}.t{background:var(--t)}.p1{background:var(--p1)}.p2{background:var(--p2)}.o{background:var(--o)}.v{background:var(--v)}.empty{opacity:.42}
.jp{font-size:clamp(30px,6vw,56px);font-weight:950;line-height:1.25;text-align:center;margin:14px 0 8px}
.kana{font-size:clamp(18px,3.6vw,28px);font-weight:850;text-align:center;color:#374151;margin:8px 0}
.romaji{font-size:clamp(16px,3vw,22px);text-align:center;color:#4b5563;margin:8px 0}
.zh{font-size:clamp(18px,3.3vw,24px);font-weight:850;text-align:center;margin:10px 0;color:#111827}
.note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:14px;padding:10px 12px;font-size:14px;line-height:1.6;margin-top:12px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tab{box-shadow:none;border:1px solid var(--line);background:white}
.tab.active{background:#111827;color:white}
.panel{display:none}.panel.active{display:block}
.list{display:flex;flex-direction:column;gap:8px;max-height:540px;overflow:auto;padding-right:4px}
.item{text-align:left;border:1px solid var(--line);background:white;border-radius:16px;padding:10px 12px;box-shadow:none;cursor:pointer}
.item.active{outline:3px solid #111827}
.small{font-size:13px;color:var(--muted);margin-top:3px}
.builder{display:grid;grid-template-columns:1fr;gap:10px}
.row2{display:grid;grid-template-columns:1fr 86px;gap:8px}
.field label{display:block;font-size:13px;font-weight:950;color:#374151;margin-bottom:4px}
.field select{width:100%;border-radius:14px;box-shadow:none;border:1px solid var(--line);background:#f9fafb}
table{width:100%;border-collapse:collapse;font-size:14px;background:white}
th,td{border:1px solid var(--line);padding:8px;vertical-align:top}
th{background:#f3f4f6;text-align:left}
.tablewrap{overflow:auto;max-height:570px}
.countBox{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:12px;line-height:1.8;font-size:14px}
.footer{margin:18px 0 32px;text-align:center;color:var(--muted);font-size:13px}
.particleMark{color:#dc2626;font-weight:950}
.block .particleMark{color:#fff;background:#dc2626;border-radius:8px;padding:0 4px;text-shadow:none}
.jp .particleMark{color:#dc2626;font-weight:950}
.kana .particleMark,.romaji .particleMark{color:#dc2626;font-weight:950}

.shadowBox{margin-top:12px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:14px;padding:10px 12px;font-size:14px;line-height:1.65;text-align:left}
.shadowBox b{color:#111827}


/* v7 compact layout + click-to-read sentence area */
header{padding:14px 16px 10px}
header h1{margin-bottom:0}
.pattern{display:none}
.topControls{margin:0 0 12px}
.topControls select,.topControls button{margin-bottom:0}
.readArea{
  border:3px solid #fb923c;
  border-radius:0;
  padding:10px 8px 12px;
  margin:10px 0 10px;
  background:#fff;
  cursor:pointer;
  touch-action:manipulation;
}
.readArea:active{background:#fff7ed}
.sentenceControls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin:10px 0 0;
}
.sentenceControls button{min-width:108px}
.note,.shadowBox{display:none!important}
.tabs{margin-top:0}
@media(max-width:900px){
  main{padding:10px}
  .layout{gap:10px}
  .card{padding:10px}
  .topControls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .topControls select,.topControls button{width:100%;min-width:0}
  .topControls select:first-child{grid-column:1/-1}
  .formula{margin-bottom:10px}
  .blocks{margin:10px 0}
  .jp{font-size:clamp(32px,9vw,44px);margin:4px 0 8px}
  .kana{font-size:clamp(18px,5vw,24px);margin:4px 0}
  .romaji{font-size:clamp(16px,4.5vw,20px);margin:4px 0}
  .zh{font-size:clamp(18px,5vw,22px);margin:8px 0 2px}
}
@media(max-width:520px){
  .sentenceControls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .sentenceControls #shadowBtn{grid-column:1/-1}
}


@media(max-width:520px){
  .sentenceControls #shadowBtn{grid-column:1/2}
  .sentenceControls #stopShadowBtn{grid-column:2/3}
}

</style>
</head>
<body>
<header>
  <h1 id="title">日文語法(STPPOV)含助詞替換句型練習</h1>
</header>

<main>
  <div class="toolbar topControls">
    <select id="shadowMode" title="Shadowing 模式">
      <option value="listen_repeat">聽一句→跟讀 3 回</option>
      <option value="block">積木慢練：S→T→P→P→O→V</option>
      <option value="speed" selected>三段速度：0.75→0.9→1.0</option>
    </select>
    <button class="light" id="randomBtn">隨機自然句</button>
    <button class="light" id="autoSpeakBtn">自動朗讀：開</button>
    <select id="voiceSelect"></select>
    <select id="rateSelect">
      <option value="0.75">0.75x 慢速</option>
      <option value="0.9">0.9x 練習</option>
      <option value="1" selected>1.0x 標準</option>
    </select>
  </div>

  <div class="layout">
    <section class="card">
      <div class="formula">
        S + T + P + P + O + V<br>
        主詞<span class="red">は / が</span> → 時間<span class="red">∅ / に</span> → 地點<span class="red">で / に / へ</span> → 人<span class="red">と / に</span> → 受詞<span class="red">を / が / に</span> → 動詞
      </div>
      <div class="blocks" id="blocks"></div>
      <div class="readArea" id="readArea" title="點擊此區可朗讀">
        <div class="jp" id="jp"></div>
        <div class="kana" id="kana"></div>
        <div class="romaji" id="romaji"></div>
        <div class="zh" id="zh"></div>
      </div>
      <div class="sentenceControls">
          <button class="light" id="prevBtn">上一句</button>
          <button class="light" id="nextBtn">下一句</button>
          <button class="warn" id="shadowBtn">Shadowing 順播</button>
          <button class="light" id="stopShadowBtn">停止</button>
        </div>
    </section>

    <aside class="card">
      <div class="tabs">
        <button class="tab active" data-tab="listPanel">句子</button>
        <button class="tab" data-tab="builderPanel">自選積木</button>
        <button class="tab" data-tab="particlePanel">助詞表</button>
        <button class="tab" data-tab="countPanel">組合數</button>
      </div>

      <div class="panel active" id="listPanel"><div class="list" id="sentenceList"></div></div>
      <div class="panel" id="builderPanel"><div class="builder" id="builder"></div></div>
      <div class="panel" id="particlePanel"><div class="tablewrap"><table id="particleTable"></table></div></div>
      <div class="panel" id="countPanel"><div class="countBox" id="countBox"></div></div>
    </aside>
  </div>

  <div class="footer">v9：Shadowing 按一次從第01句順播到最後一句。</div>
</main>

"を", "verb": "take_photo"}], "note": "v9：修正 Shadowing 順播，按一次會從第01句依序播放到最後一句；刪除中文挑戰模式。"}</script>
<script>
let DATA=null,current=0,voices=[],autoSpeak=true,shadowPlaying=false;
const $=id=>document.getElementById(id);
const clean=s=>(s||"").trim();

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function markParticleText(word, particle){
  if(!particle) return esc(word);
  const w=String(word || "");
  const p=String(particle || "");
  if(w.endsWith(p)){
    return esc(w.slice(0, -p.length)) + '<span class="particleMark">' + esc(p) + '</span>';
  }
  return esc(w);
}
function renderMarkedSentence(b){
  const parts=[
    [b.units.su.word,b.units.su.particle],
    [b.units.tu.word,b.units.tu.particle],
    [b.units.pu.word,b.units.pu.particle],
    [b.units.hu.word,b.units.hu.particle],
    [b.units.ou.word,b.units.ou.particle],
    [b.verb.word,""]
  ].filter(x=>clean(x[0]));
  return parts.map(x=>markParticleText(x[0],x[1])).join("") + "。";
}
function markReadingUnit(text, particle){
  if(!particle) return esc(text);
  const tokens = String(text || "").split(" ");
  if(tokens.length && tokens[tokens.length-1] === particle){
    tokens[tokens.length-1] = '<span class="particleMark">' + esc(tokens[tokens.length-1]) + '</span>';
    return tokens.join(" ");
  }
  return esc(text);
}
function renderMarkedKana(b){
  const parts=[
    [b.units.su.kana,b.units.su.particle],
    [b.units.tu.kana,b.units.tu.particle],
    [b.units.pu.kana,b.units.pu.particle],
    [b.units.hu.kana,b.units.hu.particle],
    [b.units.ou.kana,b.units.ou.particle],
    [b.verb.kana,""]
  ].filter(x=>clean(x[0]));
  return parts.map(x=>markReadingUnit(x[0],x[1])).join(" ") + "。";
}
function renderMarkedRomaji(b){
  const parts=[
    [b.units.su.romaji,b.units.su.particle==="は"?"wa":b.units.su.particle],
    [b.units.tu.romaji,b.units.tu.particle],
    [b.units.pu.romaji,b.units.pu.particle==="へ"?"e":b.units.pu.particle],
    [b.units.hu.romaji,b.units.hu.particle],
    [b.units.ou.romaji,b.units.ou.particle==="を"?"o":b.units.ou.particle],
    [b.verb.romaji,""]
  ].filter(x=>clean(x[0]));
  return parts.map(x=>markReadingUnit(x[0],x[1])).join(" ") + ".";
}


async function loadLesson(){
  const embedded=JSON.parse($("embeddedLesson").textContent);
  try{
    const res=await fetch("./lesson.json",{cache:"no-store"});
    const text=await res.text();
    if(!res.ok)throw new Error("HTTP "+res.status);
    if(text.trim().startsWith("<"))throw new Error("讀到 HTML，不是 JSON");
    return JSON.parse(text);
  }catch(e){console.warn("使用內建 JSON：",e);return embedded;}
}
function findByWord(group, word){return DATA.blocks[group].find(x=>x.word===word)||DATA.blocks[group][0];}
function findVerb(key){return DATA.blocks.verbs.find(v=>v.key===key)||DATA.blocks.verbs[0];}
function pInfo(type,p){return DATA.particles[type].find(x=>x.jp===p)||DATA.particles[type][0];}
function isPast(t){return t && t.tense==="past";}
function verbForm(v,past){return {word:past?v.past_jp:v.jp,kana:past?v.past_kana:v.kana,romaji:past?v.past_romaji:v.romaji,zh:v.zh};}
function unit(word,kana,romaji,particle,type){
  const p=pInfo(type,particle);
  return {
    word: clean(word+particle),
    kana: clean(kana+(p.kana?(" "+p.kana):"")),
    romaji: clean(romaji+(p.romaji?(" "+p.romaji):"")),
    particle,
    pzh:p.zh
  };
}
function buildSentence(s){
  const subj=findByWord("subjects",s.subject), time=findByWord("times",s.time), place=findByWord("places",s.place);
  const person=findByWord("people",s.person||""), obj=findByWord("objects",s.object), verb=findVerb(s.verb);
  const vf=verbForm(verb,isPast(time));
  const su=unit(subj.word,subj.kana,subj.romaji,s.subjectParticle,"subject");
  const tu=unit(time.word,time.kana,time.romaji,s.timeParticle,"time");
  const pu=unit(place.word,place.kana,place.romaji,s.placeParticle,"place");
  const hu=person.word ? unit(person.word,person.kana,person.romaji,s.personParticle,"person") : {word:"",kana:"",romaji:"",particle:"",pzh:"不加人物"};
  const ou=unit(obj.word,obj.kana,obj.romaji,s.objectParticle,"object");
  const jp=[su.word,tu.word,pu.word,hu.word,ou.word,vf.word].filter(clean).join("");
  const kana=[su.kana,tu.kana,pu.kana,hu.kana,ou.kana,vf.kana].filter(clean).join(" ");
  const romaji=[su.romaji,tu.romaji,pu.romaji,hu.romaji,ou.romaji,vf.romaji].filter(clean).join(" ");
  const zh=[subj.zh,time.zh,place.zh,person.zh,obj.zh,vf.zh].filter(x=>x&&x!=="不加人物").join(" / ");
  const warnings=[];
  if(!verb.naturalObjects.includes(obj.word))warnings.push("受詞＋動詞不自然：例如「"+obj.word+"」不一定適合「"+verb.jp+"」。");
  if(!verb.naturalPlaceParticles.includes(s.placeParticle))warnings.push("地點助詞可替換，但這個動詞最常用："+verb.naturalPlaceParticles.join(" / "));
  if(person.word && !verb.naturalPersonParticles.includes(s.personParticle))warnings.push("人物助詞可替換，但這個動詞最常用："+verb.naturalPersonParticles.filter(clean).join(" / "));
  if(s.objectParticle!==verb.defaultObjectParticle)warnings.push("受詞助詞已替換；初學肯定句多先用「"+verb.defaultObjectParticle+"」。");
  return {subj,time,place,person,obj,verb:vf,jp,kana,romaji,zh,warnings,units:{su,tu,pu,hu,ou}};
}
function renderBlocks(b){
  const arr=[
    ["S 主詞",b.units.su,"s"],["T 時間",b.units.tu,"t"],["P 地點",b.units.pu,"p1"],["P 人物",b.units.hu,"p2"],["O 受詞",b.units.ou,"o"],["V 動詞",b.verb,"v"]
  ];
  $("blocks").innerHTML=arr.map(([label,x,cls])=>`<div class="block ${cls} ${!clean(x.word)?"empty":""}"><div class="label">${label}</div><div class="bjp">${markParticleText(x.word||"—",x.particle||"")}</div><div class="bkana">${markReadingUnit(x.kana||"",x.particle||"")}</div><div class="bzh">${esc(x.pzh||x.zh||"")}</div></div>`).join("");
}
function renderSentence(){
  const b=buildSentence(DATA.sentences[current]);
  renderBlocks(b);
  renderShadowGuide(b);
  $("jp").innerHTML=renderMarkedSentence(b);
  $("kana").innerHTML=renderMarkedKana(b);
  $("romaji").innerHTML=renderMarkedRomaji(b);
  $("zh").textContent=b.zh;
  /* v7: note removed from UI */
  [...document.querySelectorAll(".item")].forEach((el,i)=>el.classList.toggle("active",i===current));
}
function renderList(){
  $("sentenceList").innerHTML=DATA.sentences.map((s,i)=>{const b=buildSentence(s);return `<button class="item" data-idx="${i}"><b>${String(i+1).padStart(2,"0")}. ${renderMarkedSentence(b)}</b><div class="small">${b.kana}</div><div class="small">${b.zh}</div></button>`;}).join("");
  document.querySelectorAll(".item").forEach(btn=>btn.onclick=()=>{stopShadowing();goSentence(Number(btn.dataset.idx), true);});
}
function optionWord(group){return DATA.blocks[group].map(x=>`<option value="${x.word}">${x.word||"—"}｜${x.kana||""}｜${x.zh}</option>`).join("");}
function optionParticle(type){return DATA.particles[type].map(x=>`<option value="${x.jp}">${x.jp||"∅"}｜${x.zh}</option>`).join("");}
function fieldPair(label, group, particleType){
  const div=document.createElement("div");div.className="field";
  div.innerHTML=`<label>${label}</label><div class="row2"><select data-role="${group}">${optionWord(group)}</select><select data-role="${particleType}">${optionParticle(particleType)}</select></div>`;
  return div;
}
function renderBuilder(){
  const b=$("builder");b.innerHTML="";
  b.appendChild(fieldPair("S 主詞 + 助詞", "subjects", "subject"));
  b.appendChild(fieldPair("T 時間 + 助詞", "times", "time"));
  b.appendChild(fieldPair("P 地點 + 助詞", "places", "place"));
  b.appendChild(fieldPair("P 人物 + 助詞", "people", "person"));
  b.appendChild(fieldPair("O 受詞 + 助詞", "objects", "object"));
  const v=document.createElement("div");v.className="field";
  v.innerHTML=`<label>V 動詞</label><select data-role="verb">${DATA.blocks.verbs.map(x=>`<option value="${x.key}">${x.jp}｜${x.kana}｜${x.zh}</option>`).join("")}</select>`;
  b.appendChild(v);
  const btn=document.createElement("button");btn.className="primary";btn.textContent="產生句子";
  btn.onclick=()=>{
    const val=r=>b.querySelector(`[data-role="${r}"]`).value;
    const time=findByWord("times",val("times"));
    const person=val("people");
    const item={subject:val("subjects"),subjectParticle:val("subject"),time:val("times"),timeParticle:val("time")||time.defaultParticle||"",place:val("places"),placeParticle:val("place"),person:person,personParticle:person?val("person"):"",object:val("objects"),objectParticle:val("object"),verb:val("verb")};
    DATA.sentences.push(item);current=DATA.sentences.length-1;renderList();renderSentence();document.querySelector('[data-tab="listPanel"]').click();
  };
  b.appendChild(btn);
  b.querySelector('[data-role="subject"]').value="は";
  b.querySelector('[data-role="time"]').value="";
  b.querySelector('[data-role="place"]').value="で";
  b.querySelector('[data-role="person"]').value="";
  b.querySelector('[data-role="object"]').value="を";
}
function renderParticleTable(){
  const rows=[];
  Object.entries(DATA.particles).forEach(([type,arr])=>arr.forEach(x=>rows.push([type,x.jp||"∅",x.kana||"",x.romaji||"",x.zh])));
  $("particleTable").innerHTML=`<thead><tr><th>位置</th><th>助詞</th><th>平假名</th><th>羅馬拼音</th><th>中文說明</th></tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>`;
}
function renderCount(){
  const S=DATA.blocks.subjects.length, SP=DATA.particles.subject.length, T=DATA.blocks.times.length, TP=DATA.particles.time.length;
  const P=DATA.blocks.places.length, PP=DATA.particles.place.length, H=DATA.blocks.people.length, HP=DATA.particles.person.length;
  const O=DATA.blocks.objects.length, OP=DATA.particles.object.length, V=DATA.blocks.verbs.length;
  const free=S*SP*T*TP*P*PP*H*HP*O*OP*V;
  const naturalOV=DATA.blocks.verbs.reduce((sum,v)=>sum+v.naturalObjects.length,0);
  const natural=S*SP*T*P*H*naturalOV;
  $("countBox").innerHTML=`<b>完全自由交叉：</b><br>${S}主詞 × ${SP}主詞助詞 × ${T}時間 × ${TP}時間助詞 × ${P}地點 × ${PP}地點助詞 × ${H}人物 × ${HP}人物助詞 × ${O}受詞 × ${OP}受詞助詞 × ${V}動詞<br>= <b>${free.toLocaleString()}</b> 句<br><br><b>較自然的基本句：</b><br>限制「受詞＋動詞」自然搭配，且使用預設常用助詞<br>= <b>${natural.toLocaleString()}</b> 句<br><br>注意：助詞全部自由替換會產生很多文法上可分析、但語意不自然的句子，所以練習時建議先用「隨機自然句」。`;
}

function goSentence(nextIndex, shouldSpeak=true){
  current=(nextIndex+DATA.sentences.length)%DATA.sentences.length;
  renderSentence();
  if(shouldSpeak && autoSpeak){
    setTimeout(()=>speak(buildSentence(DATA.sentences[current]).jp), 180);
  }
}
function toggleAutoSpeak(){
  autoSpeak=!autoSpeak;
  $("autoSpeakBtn").textContent=autoSpeak ? "自動朗讀：開" : "自動朗讀：關";
  $("autoSpeakBtn").className=autoSpeak ? "light" : "warn";
}

function randomNatural(){
  const subj=DATA.blocks.subjects[Math.floor(Math.random()*DATA.blocks.subjects.length)];
  const time=DATA.blocks.times[Math.floor(Math.random()*DATA.blocks.times.length)];
  const place=DATA.blocks.places[Math.floor(Math.random()*DATA.blocks.places.length)];
  const verb=DATA.blocks.verbs[Math.floor(Math.random()*DATA.blocks.verbs.length)];
  const objWord=verb.naturalObjects[Math.floor(Math.random()*verb.naturalObjects.length)];
  const people=DATA.blocks.people;
  const person=people[Math.floor(Math.random()*people.length)];
  const naturalPersons=verb.naturalPersonParticles;
  const pp=person.word ? naturalPersons.filter(clean)[0] || "と" : "";
  DATA.sentences.push({subject:subj.word,subjectParticle:"は",time:time.word,timeParticle:time.defaultParticle||"",place:place.word,placeParticle:verb.naturalPlaceParticles[0]||"で",person:person.word,personParticle:pp,object:objWord,objectParticle:verb.defaultObjectParticle,verb:verb.key});
  current=DATA.sentences.length-1;renderList();renderSentence();
}
function loadVoices(){
  voices=speechSynthesis.getVoices();
  const ja=voices.filter(v=>/ja|Japan|Japanese|日本/i.test(v.lang+v.name));
  const list=ja.length?ja:voices;
  $("voiceSelect").innerHTML=list.map(v=>`<option value="${voices.indexOf(v)}">${v.name} (${v.lang})</option>`).join("");
}

function getBlockSpeechParts(b){
  const parts=[
    ["S 主詞", b.units.su.word],
    ["T 時間", b.units.tu.word],
    ["P 地點", b.units.pu.word],
    ["P 人物", b.units.hu.word],
    ["O 受詞", b.units.ou.word],
    ["V 動詞", b.verb.word]
  ].filter(x=>clean(x[1]));
  return parts;
}
function renderShadowGuide(b){
  const parts=getBlockSpeechParts(b);
  const blockLine=parts.map(x=>x[1]).join("｜");
  if(!$("shadowGuide")) return;
  $("shadowGuide").innerHTML=
    "<b>Shadowing 建議：</b><br>" +
    "1. 先聽完整句。<br>" +
    "2. 再跟著積木節奏念：<b>"+blockLine+"</b><br>" +
    "3. 最後不看羅馬拼音，只看日文念一次。";
}
function speakUtterance(text, rate=1, after=null){
  const vi=Number($("voiceSelect").value);
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  u.rate=rate;
  if(voices[vi])u.voice=voices[vi];
  u.onend=()=>{ if(after) setTimeout(after, 450); };
  speechSynthesis.speak(u);
}
function speakSequence(items){
  speechSynthesis.cancel();
  let i=0;
  const next=()=>{
    if(i>=items.length)return;
    const item=items[i++];
    if(item.pause){ setTimeout(next, item.pause); return; }
    speakUtterance(item.text, item.rate || Number($("rateSelect").value||1), next);
  };
  next();
}

function buildShadowItemsForSentence(b, mode){
  if(mode==="listen_repeat"){
    return [
      {text:b.jp, rate:0.9},
      {pause:500},
      {text:b.jp, rate:0.9},
      {pause:500},
      {text:b.jp, rate:1.0}
    ];
  }
  if(mode==="block"){
    const items=[];
    getBlockSpeechParts(b).forEach(([label,text])=>{
      items.push({text:text, rate:0.75});
      items.push({pause:260});
    });
    items.push({text:b.jp, rate:0.9});
    return items;
  }
  return [
    {text:b.jp, rate:0.75},
    {pause:350},
    {text:b.jp, rate:0.9},
    {pause:350},
    {text:b.jp, rate:1.0}
  ];
}
function speakSequenceAsync(items, done){
  let i=0;
  const next=()=>{
    if(!shadowPlaying){
      if(done) done(false);
      return;
    }
    if(i>=items.length){
      if(done) done(true);
      return;
    }
    const item=items[i++];
    if(item.pause){
      setTimeout(next, item.pause);
      return;
    }
    speakUtterance(item.text, item.rate || Number($("rateSelect").value||1), next);
  };
  next();
}
function shadowPractice(){
  if(shadowPlaying){
    stopShadowing();
    return;
  }
  shadowPlaying=true;
  speechSynthesis.cancel();
  $("shadowBtn").textContent="播放中...";
  const oldAuto=autoSpeak;
  autoSpeak=false;
  let idx=0;
  const mode=$("shadowMode") ? $("shadowMode").value : "speed";

  const playNext=()=>{
    if(!shadowPlaying){
      autoSpeak=oldAuto;
      $("shadowBtn").textContent="Shadowing 順播";
      return;
    }
    if(idx>=DATA.sentences.length){
      shadowPlaying=false;
      autoSpeak=oldAuto;
      $("shadowBtn").textContent="Shadowing 順播";
      return;
    }

    current=idx;
    renderSentence();

    const listItems=[...document.querySelectorAll(".item")];
    listItems.forEach((el,i)=>el.classList.toggle("active", i===current));
    if(listItems[current]) listItems[current].scrollIntoView({block:"nearest", behavior:"smooth"});

    const b=buildSentence(DATA.sentences[current]);
    const items=buildShadowItemsForSentence(b, mode);
    idx++;

    speakSequenceAsync(items, ok=>{
      if(ok) setTimeout(playNext, 650);
      else {
        autoSpeak=oldAuto;
        $("shadowBtn").textContent="Shadowing 順播";
      }
    });
  };
  playNext();
}
function stopShadowing(){
  shadowPlaying=false;
  speechSynthesis.cancel();
  if($("shadowBtn")) $("shadowBtn").textContent="Shadowing 順播";
}

async function init(){
  DATA=await loadLesson();$("title").textContent=DATA.title;
  renderList();renderBuilder();renderParticleTable();renderCount();renderSentence();loadVoices();speechSynthesis.onvoiceschanged=loadVoices;
  if($("speakBtn")) $("speakBtn").onclick=()=>speak(buildSentence(DATA.sentences[current]).jp);
  $("readArea").onclick=()=>{stopShadowing();speak(buildSentence(DATA.sentences[current]).jp);};
  $("shadowBtn").onclick=shadowPractice;
  $("stopShadowBtn").onclick=stopShadowing;
  $("prevBtn").onclick=()=>{stopShadowing();goSentence(current-1,true);};
  $("nextBtn").onclick=()=>{stopShadowing();goSentence(current+1,true);};
  $("randomBtn").onclick=()=>{stopShadowing();randomNatural(); if(autoSpeak) setTimeout(()=>speak(buildSentence(DATA.sentences[current]).jp),180);};
  $("autoSpeakBtn").onclick=toggleAutoSpeak;
  document.querySelectorAll(".tab").forEach(tab=>tab.onclick=()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));tab.classList.add("active");$(tab.dataset.tab).classList.add("active");});
}
init();
</script>
</body>
